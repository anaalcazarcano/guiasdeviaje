  async function loadWeather() {
    const w = document.getElementById('weather-content');
    if (!w) return;
    const om = DATA.overview_map;
    if (!om) { w.textContent = 'Sin coordenadas.'; return; }

    const start = DATA.meta.dates.start;
    const end   = DATA.meta.dates.end;
    const lat   = om.center.lat;
    const lng   = om.center.lng;

    const today     = new Date(); today.setHours(0,0,0,0);
    const tripStart = new Date(start + 'T00:00:00');
    const tripEnd   = new Date(end   + 'T00:00:00');
    const daysUntilStart = Math.round((tripStart - today) / 86400000);
    const FORECAST_WINDOW = 14; // días que Open-Meteo garantiza con fiabilidad

    const codes = {
      0:'☀️', 1:'🌤', 2:'⛅', 3:'☁️', 45:'🌫', 48:'🌫',
      51:'🌦', 53:'🌦', 55:'🌦', 61:'🌧', 63:'🌧', 65:'🌧',
      71:'🌨', 73:'🌨', 75:'🌨', 80:'🌦', 81:'🌧', 82:'⛈',
      95:'⛈', 96:'⛈', 99:'⛈'
    };

    function renderGrid(days, label) {
      const html = days.map(d => `
        <div class="weather-day">
          <div class="weather-day__date">${fmtDate(d.date, { weekday: 'short', day: 'numeric' })}</div>
          <div class="weather-day__icon">${d.icon}</div>
          <div class="weather-day__temp">${d.max}° <span class="weather-day__temp-min">${d.min}°</span></div>
        </div>`).join('');
      const note = label ? `<p style="font-size:11px;color:var(--text-muted);margin:8px 0 0;text-align:center">${label}</p>` : '';
      w.outerHTML = `<div id="weather-content">${note}<div class="weather-grid">${html}</div></div>`;
    }

    // ── CASO 1: viaje ya pasó ────────────────────────────────────────────
    if (tripEnd < today) {
      w.innerHTML = '<span style="color:var(--text-muted);font-size:13px">El viaje ya ha finalizado.</span>';
      return;
    }

    // ── CASO 2: viaje dentro del rango de previsión (≤14 días) ──────────
    if (daysUntilStart <= FORECAST_WINDOW) {
      try {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&start_date=${start}&end_date=${end}`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(r.status);
        const j = await r.json();
        if (!j.daily || !j.daily.time.length) throw new Error('sin datos');
        const days = j.daily.time.map((t, i) => ({
          date: t,
          icon: codes[j.daily.weather_code[i]] || '🌡',
          max:  Math.round(j.daily.temperature_2m_max[i]),
          min:  Math.round(j.daily.temperature_2m_min[i])
        }));
        renderGrid(days, null);
        return;
      } catch (e) {
        w.textContent = 'Error al obtener la previsión. Comprueba tu conexión.';
        return;
      }
    }

    // ── CASO 3: viaje a más de 14 días → datos históricos del año anterior
    // Calculamos las mismas fechas del año pasado para obtener el clima típico
    const lastYearStart = start.replace(/^(\d{4})/, y => String(parseInt(y) - 1));
    const lastYearEnd   = end.replace(/^(\d{4})/, y => String(parseInt(y) - 1));
    const availableFrom = new Date(tripStart);
    availableFrom.setDate(availableFrom.getDate() - FORECAST_WINDOW);
    const availableFromStr = availableFrom.toLocaleDateString('es-ES', { day: 'numeric', month: 'long' });

    try {
      const url = `https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lng}&start_date=${lastYearStart}&end_date=${lastYearEnd}&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(r.status);
      const j = await r.json();
      if (!j.daily || !j.daily.time.length) throw new Error('sin datos');
      const days = j.daily.time.map((t, i) => ({
        date: t.replace(/^(\d{4})/, y => String(parseInt(y) + 1)), // mostrar con fecha real del viaje
        icon: codes[j.daily.weather_code[i]] || '🌡',
        max:  Math.round(j.daily.temperature_2m_max[i]),
        min:  Math.round(j.daily.temperature_2m_min[i])
      }));
      renderGrid(days,
        `📅 Previsión disponible aprox. el ${availableFromStr} · Datos: mismo periodo del año anterior`
      );
    } catch (e) {
      // Fallback: mensaje claro sin datos históricos
      w.innerHTML = `<span style="font-size:13px;color:var(--text-muted)">
        La previsión meteorológica estará disponible aprox. el <strong>${availableFromStr}</strong>.
        El viaje empieza en ${daysUntilStart} días, fuera del rango de previsión (${FORECAST_WINDOW} días).
        Vuelve más cerca de la fecha para ver el tiempo real.
      </span>`;
    }
  }

    `;

    // --- Sección gastos compartidos ---
    const sp = store.split;
    const today = todayISO();

    // Calcular balances netos: para cada gasto, cada beneficiario debe su parte proporcional
    const balances = {}; // balance positivo = le deben, negativo = debe
    sp.people.forEach(p => { balances[p] = 0; });
    const splitGrandTotal = sp.expenses.reduce((s, e) => s + e.amount, 0);

    sp.expenses.forEach(e => {
      const beneficiaries = (e.forWhom && e.forWhom.length > 0) ? e.forWhom : sp.people;
      const share = e.amount / beneficiaries.length;
      // El pagador adelanta el total
      balances[e.paidBy] = (balances[e.paidBy] || 0) + e.amount;
      // Cada beneficiario "consume" su parte
      beneficiaries.forEach(b => {
        balances[b] = (balances[b] || 0) - share;
      });
    });

    // Calcular transferencias mínimas para liquidar
    function calcTransfers(bal) {
      const debtors = []; // deben dinero (balance negativo)
      const creditors = []; // les deben (balance positivo)
      Object.keys(bal).forEach(p => {
        const b = Math.round(bal[p] * 100) / 100;
        if (b < -0.01) debtors.push({ name: p, amount: -b });
        else if (b > 0.01) creditors.push({ name: p, amount: b });
      });
      // Ordenar de mayor a menor para minimizar transferencias
      debtors.sort((a,b) => b.amount - a.amount);
      creditors.sort((a,b) => b.amount - a.amount);

      const transfers = [];
      let di = 0, ci = 0;
      while (di < debtors.length && ci < creditors.length) {
        const pay = Math.min(debtors[di].amount, creditors[ci].amount);
        if (pay > 0.01) {
          transfers.push({ from: debtors[di].name, to: creditors[ci].name, amount: Math.round(pay * 100) / 100 });
        }
        debtors[di].amount -= pay;
        creditors[ci].amount -= pay;
        if (debtors[di].amount < 0.01) di++;
        if (creditors[ci].amount < 0.01) ci++;
      }
      return transfers;
    }

    const transfers = sp.expenses.length > 0 ? calcTransfers({...balances}) : [];

    // Cuánto ha pagado cada persona en total

      const amount = parseFloat(document.getElementById('exp-amount').value);
      const category = document.getElementById('exp-cat').value;
      if (!desc || !amount || isNaN(amount)) return;
      store.expenses.push({ id: 'e_' + Date.now(), desc, amount, category, date: todayISO() });
      saveStore();
      renderMeBudget();
      renderMeOverview();
    });
    document.querySelectorAll('[data-del]').forEach(b => {
      b.addEventListener('click', () => {
        store.expenses = store.expenses.filter(e => e.id !== b.dataset.del);
        saveStore();
        renderMeBudget();
        renderMeOverview();
      });
    });

    // --- Listeners para gastos compartidos ---
    const addPersonBtn = document.getElementById('split-add-person');
    const newPersonInp = document.getElementById('split-new-person');
    if (addPersonBtn) {
      const doAddPerson = () => {
        const name = newPersonInp.value.trim();
        if (!name || store.split.people.includes(name)) return;
        store.split.people.push(name);
        saveStore();
        renderMeBudget();
      };
      addPersonBtn.addEventListener('click', doAddPerson);
      newPersonInp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doAddPerson(); } });
    }

    document.querySelectorAll('[data-rm-person]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.rmPerson);
        const removed = store.split.people[idx];
        store.split.people.splice(idx, 1);
        store.split.expenses = store.split.expenses.filter(e => e.paidBy !== removed);
        // También limpiar de forWhom
        store.split.expenses.forEach(e => {
          if (e.forWhom) e.forWhom = e.forWhom.filter(p => p !== removed);
        });
        saveStore();
        renderMeBudget();
      });
    });

    const addSplitBtn = document.getElementById('split-add-exp');
    if (addSplitBtn) {
      addSplitBtn.addEventListener('click', () => {
        const desc = document.getElementById('split-desc').value.trim();
        const amount = parseFloat(document.getElementById('split-amount').value);
        const who = document.getElementById('split-who').value;
        const date = document.getElementById('split-date').value || todayISO();
        // Leer beneficiarios seleccionados
        const checkboxes = document.querySelectorAll('#split-for-whom input[type="checkbox"]');
        const forWhom = [];
        checkboxes.forEach(cb => { if (cb.checked) forWhom.push(cb.value); });
        if (!desc || !amount || isNaN(amount) || !who || forWhom.length === 0) {
          if (forWhom.length === 0) alert('Selecciona al menos una persona como beneficiario del gasto.');
          return;
        }
        store.split.expenses.push({ desc, amount, paidBy: who, forWhom, date });
        saveStore();
        renderMeBudget();
      });
    }

    document.querySelectorAll('[data-del-split]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.delSplit);
        store.split.expenses.splice(idx, 1);
        saveStore();
        renderMeBudget();
      });
    });
  }

  function getPackingData() {
    // Si el usuario ha editado, usa la copia custom. Si no, parte de DATA.
    if (store.packing_custom) return JSON.parse(JSON.stringify(store.packing_custom));
    return JSON.parse(JSON.stringify(DATA.packing_list || {}));
  }
  function savePackingData(pl) {
    store.packing_custom = pl;
    saveStore();
  }

  function renderMePacking() {
    const paneEl = document.querySelector('[data-me-pane="packing"]');
    if (!paneEl) return;
    const pl = getPackingData();
    const labels = {
      summer_clothing: '☀️ Ropa de verano', winter_clothing: '🧥 Ropa de invierno',
      footwear: '👟 Calzado', underwear: '🩲 Ropa interior', items: '🎒 Objetos',
      accessories: '🧢 Complementos', documents: '📄 Documentación',
      toiletries: '🧴 Bolsa de aseo', health: '💊 Salud', other: '📦 Otros',
      clothing: '👕 Ropa', tech: '🔌 Tecnología'
    };
    const preferredOrder = [
      'summer_clothing', 'winter_clothing', 'clothing', 'footwear', 'underwear',
      'items', 'tech', 'accessories', 'documents', 'toiletries', 'health', 'other'
    ];
    const orderedKeys = preferredOrder.filter(k => pl[k] && pl[k].length > 0).concat(
      Object.keys(pl).filter(k => !preferredOrder.includes(k) && pl[k] && pl[k].length > 0)
    );

    if (orderedKeys.length === 0) {
      paneEl.innerHTML = '<div class="empty-state">Sin lista de equipaje definida.</div>';
      return;
    }

    paneEl.innerHTML = orderedKeys.map(cat => `
      <div class="packing-group" data-cat="${cat}">
        <div class="packing-group__title">${labels[cat] || '📦 ' + cat}</div>
        ${(pl[cat] || []).map((item, idx) => {
          const key = `${cat}_${idx}`;
          const packed = !!store.packing[key];
          return `
            <div class="packing-item ${packed ? 'is-packed' : ''}" data-pack-key="${key}" data-cat="${cat}" data-idx="${idx}">
              <span class="packing-item__box" data-action="toggle"></span>
              <input class="packing-item__edit" type="text" value="${esc(item)}" data-action="rename">
              <button class="packing-item__remove" data-action="remove" title="Eliminar">✕</button>
            </div>`;
        }).join('')}
        <div class="packing-add-row">
          <input class="packing-add-input" data-add-cat="${cat}" placeholder="Añadir item…" type="text">
          <button class="packing-add-btn" data-add-btn="${cat}">+</button>
        </div>
      </div>`).join('') + `
      <div style="margin-top:12px">
        <button class="btn btn--ghost btn--sm" id="packing-reset" style="font-size:12px">↩ Restaurar lista original</button>
      </div>`;

    // Toggle check
    paneEl.querySelectorAll('[data-action="toggle"]').forEach(box => {
      box.addEventListener('click', () => {
        const item = box.closest('[data-pack-key]');
        const k = item.dataset.packKey;
        store.packing[k] = !store.packing[k];
        saveStore();
        item.classList.toggle('is-packed');
        renderMeOverview();
      });
    });

    // Rename inline
    paneEl.querySelectorAll('[data-action="rename"]').forEach(inp => {
      inp.addEventListener('change', () => {
        const item = inp.closest('[data-pack-key]');
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        const plData = getPackingData();
        if (plData[cat] && plData[cat][idx] !== undefined) {
          plData[cat][idx] = inp.value.trim() || plData[cat][idx];
          savePackingData(plData);
        }
      });
    });

    // Remove item
    paneEl.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', () => {
        const item = btn.closest('[data-pack-key]');
        const cat = item.dataset.cat;
        const idx = parseInt(item.dataset.idx);
        const plData = getPackingData();
        if (plData[cat]) {
          plData[cat].splice(idx, 1);
          // Also clean packing checks for this category (re-index)
          const newPacking = {};
          Object.keys(store.packing).forEach(k => {
            if (!k.startsWith(cat + '_')) newPacking[k] = store.packing[k];
          });
          (plData[cat] || []).forEach((_, i) => {
            // preserve check state by old position if possible
          });
          store.packing = newPacking;
          savePackingData(plData);
          renderMePacking();
          renderMeOverview();
        }
      });
    });

    // Add item
    paneEl.querySelectorAll('[data-add-btn]').forEach(btn => {
      const cat = btn.dataset.addBtn;
      const inp = paneEl.querySelector(`[data-add-cat="${cat}"]`);
      const doAdd = () => {
        const val = inp.value.trim();
        if (!val) return;
        const plData = getPackingData();
        if (!plData[cat]) plData[cat] = [];
        plData[cat].push(val);
        savePackingData(plData);
        inp.value = '';
        renderMePacking();
        renderMeOverview();
      };
      btn.addEventListener('click', doAdd);
      inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); doAdd(); } });
    });

    // Reset to original
    document.getElementById('packing-reset')?.addEventListener('click', () => {
      if (confirm('¿Restaurar la lista original? Se perderán los cambios que hayas hecho.')) {
        store.packing_custom = null;
        store.packing = {};
        saveStore();
        renderMePacking();
        renderMeOverview();
      }
    });
  }

  function renderMeTools() {
    const paneEl = document.querySelector('[data-me-pane="tools"]');
    if (!paneEl) return;

    // Detectar moneda local del destino: primero local_currency, luego currency si no es EUR, luego nada
    const homeCurr = 'EUR';
    const rawCurr = DATA.meta.local_currency || DATA.meta.currency || 'EUR';
    const destCurr = rawCurr === homeCurr ? null : rawCurr;

    const converterHTML = !destCurr ? '' : `
      <div class="tool-card">
        <div class="tool-card__title">💱 Conversor EUR ↔ ${esc(destCurr)}</div>

        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.06em">EUR → ${esc(destCurr)}</div>
        <div class="tool-card__row" style="margin-bottom:4px">
          <input id="conv-eur" type="number" placeholder="Euros" value="100">
          <div style="align-self:center;font-weight:700;font-size:14px;color:var(--accent)">EUR</div>
        </div>
        <div class="tool-card__result" id="conv-result-fwd">—</div>

        <div style="font-size:11px;font-weight:600;color:var(--text-muted);margin:12px 0 4px;text-transform:uppercase;letter-spacing:0.06em">${esc(destCurr)} → EUR</div>
        <div class="tool-card__row" style="margin-bottom:4px">
          <input id="conv-local" type="number" placeholder="${esc(destCurr)}" value="">
          <div style="align-self:center;font-weight:700;font-size:14px;color:var(--accent)">${esc(destCurr)}</div>
        </div>
        <div class="tool-card__result" id="conv-result-rev">—</div>

        <small id="conv-rate" style="display:block;margin-top:8px;color:var(--text-muted);font-size:11px"></small>
      </div>`;

    paneEl.innerHTML = `
      ${converterHTML}

      <div class="tool-card">
        <div class="tool-card__title">📤 Compartir esta guía</div>
        <p style="font-size:13px;color:var(--text-soft);margin-bottom:12px">Comparte el enlace de tu guía por WhatsApp, email o redes sociales.</p>
        <button class="btn btn--primary" onclick="navigator.share ? navigator.share({title: document.title, text: 'Mira mi guía de viaje', url: location.href}).catch(()=>{}) : alert('Copia la URL del navegador y compártela')">Compartir</button>
      </div>
    `;

    if (destCurr) {
      const eurInput = document.getElementById('conv-eur');
      const localInput = document.getElementById('conv-local');
      const resFwd = document.getElementById('conv-result-fwd');
      const resRev = document.getElementById('conv-result-rev');
      const rateEl = document.getElementById('conv-rate');
      let cachedRate = null;

      async function fetchRate() {
        if (cachedRate) return cachedRate;
        // Intentar con open.er-api.com (gratis, sin key, fiable)
        try {
          const r = await fetch('https://open.er-api.com/v6/latest/EUR');
          const j = await r.json();
          if (j.result === 'success' && j.rates && j.rates[destCurr]) {
            cachedRate = j.rates[destCurr];
            rateEl.textContent = '1 EUR = ' + cachedRate.toFixed(4) + ' ' + destCurr + ' (actualizado ' + (j.time_last_update_utc || 'hoy').split(' ').slice(0,4).join(' ') + ')';
            return cachedRate;
          }
        } catch (e) {}
        // Fallback: exchangerate.host
        try {
          const r2 = await fetch('https://api.exchangerate.host/latest?base=EUR&symbols=' + destCurr);
          const j2 = await r2.json();
          if (j2.rates && j2.rates[destCurr]) {
            cachedRate = j2.rates[destCurr];
            rateEl.textContent = '1 EUR = ' + cachedRate.toFixed(4) + ' ' + destCurr;
            return cachedRate;
          }
        } catch (e) {}
        rateEl.textContent = 'Sin conexión para obtener tasas';
        return null;
      }

      async function convertFwd() {
        const a = parseFloat(eurInput.value) || 0;
        const rate = await fetchRate();
        if (rate) {
          const result = a * rate;
          resFwd.textContent = new Intl.NumberFormat('es-ES', { maximumFractionDigits: 0 }).format(result) + ' ' + destCurr;
        } else {
          resFwd.textContent = 'Error';
        }
      }
      async function convertRev() {
        const a = parseFloat(localInput.value) || 0;
        const rate = await fetchRate();
        if (rate) {
          const result = a / rate;
          resRev.textContent = new Intl.NumberFormat('es-ES', { style: 'currency', currency: 'EUR', maximumFractionDigits: 2 }).format(result);
        } else {
          resRev.textContent = 'Error';
        }
      }

      eurInput.addEventListener('input', convertFwd);
      localInput.addEventListener('input', convertRev);
      convertFwd();
    }
  }

  // ------------------------------------------------------
  // 5. ACCIONES GLOBALES
  // ------------------------------------------------------
  window.__actions = {
    toggleChecklist(key) {
      store.checklist[key] = !store.checklist[key];
      saveStore();
      const item = document.querySelector(`[data-key="${key}"]`);
      if (item) item.classList.toggle('is-done');
    }
  };

  // ------------------------------------------------------
  // 6. NAVEGACIÓN
  // ------------------------------------------------------
  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('is-active'));
    el('#page-' + id).classList.add('is-active');
    window.scrollTo(0, 0);

    document.querySelectorAll('.tabbar__item').forEach(b => {
      b.classList.toggle('is-active', b.dataset.tab === id || (id === 'day' && b.dataset.tab === 'days'));
    });

    // (Re)renderizar contenido según la página
    switch (id) {
      case 'home': renderHome(); break;
      case 'days': renderDaysList(); el('#header-title').textContent = 'Itinerario'; break;
      case 'map':  renderMap(); el('#header-title').textContent = 'Mapa'; break;
      case 'tips': renderTips(); el('#header-title').textContent = 'Consejos'; break;
      case 'me':   renderMe(); el('#header-title').textContent = 'Mi viaje'; break;
    }
  }

  window.__nav = {
    go(id) { showPage(id); },
    goDay(n) { renderDay(n); showPage('day'); }
  };

  document.querySelectorAll('.tabbar__item').forEach(btn => {
    btn.addEventListener('click', () => showPage(btn.dataset.tab));
  });

  // ------------------------------------------------------
  // 7. BUSCADOR GLOBAL
  // ------------------------------------------------------
  function buildSearchIndex() {
    const idx = [];
    DATA.days.forEach(d => {
      idx.push({ type: 'Día', title: `Día ${d.day}: ${d.title}`, snippet: DATA.summary.find(s => s.day === d.day)?.summary || '', action: () => window.__nav.goDay(d.day) });
      (d.timeline || []).forEach(t => idx.push({ type: `Día ${d.day}`, title: `${t.time} · ${t.title}`, snippet: t.description, action: () => window.__nav.goDay(d.day) }));
      (d.places || []).forEach(p => idx.push({ type: `Día ${d.day} · Lugar`, title: p.name, snippet: p.review || '', action: () => window.__nav.goDay(d.day) }));
      (d.restaurants || []).forEach(r => idx.push({ type: `Día ${d.day} · Restaurante`, title: r.name, snippet: r.speciality || '', action: () => window.__nav.goDay(d.day) }));
    });
    (DATA.practical_tips || []).forEach(g => {
      (g.items || []).forEach(i => idx.push({ type: `Consejo · ${g.title}`, title: i.subtitle, snippet: i.text, action: () => window.__nav.go('tips') }));
    });
    return idx;
  }

  const searchIndex = buildSearchIndex();
  const searchOverlay = el('#search-overlay');
  const searchInput = el('#search-input');
  const searchResults = el('#search-results');

  el('#btn-search').addEventListener('click', () => {
    searchOverlay.classList.add('is-open');
    searchInput.value = '';
    searchResults.innerHTML = '';
    setTimeout(() => searchInput.focus(), 60);
  });
  el('#search-close').addEventListener('click', () => searchOverlay.classList.remove('is-open'));

  function normalize(s) { return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

  searchInput.addEventListener('input', () => {
    const q = normalize(searchInput.value.trim());
    if (q.length < 2) { searchResults.innerHTML = ''; return; }
    const matches = searchIndex
      .map(it => ({ it, score: (normalize(it.title).includes(q) ? 2 : 0) + (normalize(it.snippet).includes(q) ? 1 : 0) }))
      .filter(x => x.score > 0)
      .sort((a,b) => b.score - a.score)
      .slice(0, 30);
    searchResults.innerHTML = matches.length
      ? matches.map((m, i) => `
          <div class="search-result" data-sr="${i}">
            <div class="search-result__type">${esc(m.it.type)}</div>
            <div class="search-result__title">${esc(m.it.title)}</div>
            <div class="search-result__snippet">${esc(m.it.snippet)}</div>
          </div>`).join('')
      : '<div class="empty-state">Sin resultados.</div>';
    searchResults.querySelectorAll('[data-sr]').forEach(n => {
      n.addEventListener('click', () => {
        const m = matches[Number(n.dataset.sr)];
        searchOverlay.classList.remove('is-open');
        m.it.action();
      });
    });
  });

  // ------------------------------------------------------
  // 8. ARRANQUE
  // ------------------------------------------------------
  showPage('home');

})();
</script>
