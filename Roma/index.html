mportante: cerrado este domingo), Basílica de San Pedro, Ángelus del Papa León XIV a las 12:00. Tarde: zona norte, Piazza del Popolo, Santa María del Popolo, Ara Pacis, Piazza di Spagna. Atardecer desde el Pincio."},{"day":3,"date":"2026-07-13","weekday":"lunes","title":"Roma Antigua · Coliseo, Vittoriano, Aventino y cena en Trastevere","summary":"Coliseo, Foro Romano y Palatino al amanecer. Vittoriano con terraza panorámica. Circo Máximo, Pirámide de Cestio. Cerradura de Malta. Basílica de Santa Sabina, Roseto Comunale y Boca de la Verdad. Atardecer en el Jardín de los Naranjos a las 19:00. Cena en Trastevere."},{"day":4,"date":"2026-07-14","weekday":"martes","title":"Centro histórico · Panteón, Navona, Trevi y Santa María Maggiore","summary":"Panteón de Agripa, Campo de' Fiori, Piazza Navona, Templo de Adriano, Obelisco de Montecitorio, Santa María Maggiore (tumba del Papa Francisco). Fontana di Trevi de noche. Salida en vuelo a las 21:30."}],"days":[{"day":1,"date":"2026-07-11","title":"Llegada · Prati y Castel Sant'Angelo de noche","hero_image":"","timeline":[{"time":"17:25","icon":"✈️","title":"Salida desde Alicante","description":"Salida desde el Aeropuerto de Alicante-Elche. Llegada prevista a Roma Fiumicino a las 19:30.","type":"transport","duration_min":125},{"time":"19:30","icon":"🛬","title":"Llegada a Roma Fiumicino","description":"Recogida de maletas en Terminal 3. Seguir las señales «Treni» hacia la estación del Leonardo Express (plataformas 23-24). El tren sale cada 30 minutos y llega a Roma Termini en 32 minutos. Precio: ~14 € por persona.","type":"transport","duration_min":60},{"time":"20:45","icon":"🏨","title":"Check-in en el hotel (Prati)","description":"Desde Roma Termini: taxi tarifa fija ~15 € o metro línea A hasta Lepanto (2 paradas, ~1,50 €) y 5 minutos a pie. Prati es tranquilo, residencial y queda a 10 minutos a pie del Vaticano.","type":"checkin","duration_min":30},{"time":"21:30","icon":"🍝","title":"Cena en Prati","description":"Cena en una trattoria del barrio de Prati, donde comen los romanos sin el recargo turístico del centro. El barrio tiene opciones auténticas a precios razonables.","type":"meal","duration_min":75},{"time":"22:45","icon":"🌙","title":"Paseo nocturno: Puente de los Ángeles y Castel Sant'Angelo","description":"Paseo de 10 minutos desde Prati hasta el Ponte Sant'Angelo. El puente, diseñado por Bernini en 1669 con sus ángeles de mármol sosteniendo los instrumentos de la Pasión, y el Castel Sant'Angelo —el mausoleo de Adriano reconvertido en fortaleza papal— iluminados sobre el Tíber nocturno son una experiencia que os prepara para los próximos días.","type":"activity","duration_min":45}],"places":[{"id":"aeropuerto-fiumicino","name":"Aeropuerto Fiumicino — Leonardo da Vinci","coords":{"lat":41.7999,"lng":12.2462},"review":"El mayor aeropuerto de Italia. La estación del Leonardo Express está cubierta entre T2 y T3. Seguid las señales verdes 'Treni'. El tren sale cada 30 min y llega a Termini en 32 min.","hours":"24 horas","price":"Leonardo Express: ~14 €/persona","tips":"Comprad billete en máquinas (tarjeta aceptada). No uséis taxis no oficiales que os abordan dentro del aeropuerto.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.7999,12.2462","verified_at":"2025-06-15"},{"id":"castel-santangelo-noche","name":"Castel Sant'Angelo y Puente de los Ángeles","coords":{"lat":41.9031,"lng":12.4663},"review":"El mausoleo del emperador Adriano (135 d.C.) reconvertido en fortaleza papal. De noche, con la iluminación dorada reflejada en el Tíber y los ángeles de Bernini en el puente, es uno de los espectáculos más impresionantes de Roma sin necesidad de entrar.","hours":"Exterior: siempre abierto y gratuito. Interior: 9:00–19:30, entrada ~15 €","price":"Exterior gratuito","tips":"Para esta primera noche, contempladlo desde el puente. Es un paseo de 10 minutos desde Prati. En las próximas noches lo veréis desde distintos ángulos.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9031,12.4663","verified_at":"2025-06-15"}],"restaurants":[{"name":"Osteria dell'Angelo","meal":"cena","speciality":"Cacio e pepe, rigatoni alla pajata, abbacchio alla romana","price_range":"€€","reservation_required":true,"notes":"Via G. Bettolo 24, Prati. Cocina romana de barrio, auténtica y económica (~25 € menú completo sin bebida). Reserva obligatoria. Cierra sábados por la noche — como alternativa, Il Sorpasso (Via Properzio 31) para un aperitivo-cena informal.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=Osteria%20dell%27Angelo%20Roma"}],"alternative_plans":{"more_time":"Si llegáis con energía, extended el paseo hasta la Plaza de San Pedro (5 min más desde el Puente de los Ángeles). De noche es impresionante y os prepara para el domingo. La plaza permanece abierta las 24 horas.","less_time":"Si llegáis muy cansados, cenad en el hotel o en la primera trattoria que encontréis en Prati. El día 2 es intenso y conviene llegar bien descansados."},"logistics":{"driving_km":32,"driving_time_min":45,"walking_km":1.0,"walking_time_min":15,"public_transport":"Leonardo Express Fiumicino–Termini: ~14 €, 32 min, cada 30 min. Desde Termini: metro A hasta Lepanto (1,50 €) + 5 min a pie, o taxi tarifa fija ~15 €."},"info":{"travel_tips":["El Leonardo Express vende billetes con hora asignada: no podéis subir a un tren anterior al reservado.","Los taxis oficiales en Roma son blancos. Exigid siempre taxímetro o tarifa fija. Rechazad a quienes os aborden en el aeropuerto.","Comprad una tarjeta SIM italiana o activad el roaming europeo desde España (gratuito en UE): os hará falta para navegar en el metro."],"access":["Leonardo Express: Terminal 3, plataformas 23-24. Sale cada 30 min entre las 6:23 y las 23:23.","Metro A: Termini → Lepanto (2 paradas, ~6 min). Desde Lepanto, 5 min a pie hasta Prati degli Strozzi."],"facts":["El Castel Sant'Angelo fue construido como mausoleo por el emperador Adriano en el año 135 d.C. y reconvertido en fortaleza papal en el siglo XIV.","El Passetto di Borgo —un corredor elevado en las murallas— conecta el Vaticano con el Castel Sant'Angelo. Los papas lo usaron para huir en peligro: lo utilizó Clemente VII durante el Saco de Roma de 1527."]}},{"day":2,"date":"2026-07-12","title":"Vaticano · Basílica, Ángelus del Papa y zona norte de Roma al atardecer","hero_image":"","timeline":[{"time":"07:30","icon":"☕","title":"Desayuno y salida temprana","description":"Desayuno rápido en bar del barrio (cappuccino + cornetto). El objetivo es entrar en la Basílica de San Pedro antes de las 8:30, cuando aún hay poca gente y la luz de la mañana ilumina la Pietà de Miguel Ángel de forma extraordinaria.","type":"meal","duration_min":25},{"time":"08:00","icon":"⛪","title":"Basílica de San Pedro","description":"Llegad a la Plaza de San Pedro antes de las 8:00. El control de seguridad suele ser rápido a esa hora. La Basílica abre a las 7:00. Visitad la Pietà de Miguel Ángel (primera capilla derecha, esculpida cuando el artista tenía 24 años), el baldaquino de Bernini sobre el altar mayor, la nave central de 187 metros y subid a la terraza exterior de la cúpula para tener las mejores vistas de la Plaza antes de que se llene (8 €, ascensor hasta la mitad + escaleras). Recordad: hombros y rodillas cubiertos obligatorio.","type":"visit","duration_min":120},{"time":"10:00","icon":"🎨","title":"Museos Vaticanos — AVISO IMPORTANTE","description":"⚠️ LOS MUSEOS VATICANOS CIERRAN EL DOMINGO 13 DE JULIO (no es el último domingo del mes). Si queréis visitar los Museos y la Capilla Sixtina, debéis haberlos reservado para el sábado 12 de julio (lunes-sábado 8:00-19:00, última entrada 17:00). Reserva en museivaticani.va con 2-3 semanas de antelación. Este domingo concentrad la visita en la Basílica y el Ángelus.","type":"visit","duration_min":30},{"time":"11:15","icon":"🕊️","title":"Preparativos para el Ángelus — Plaza de San Pedro","description":"Colocaos en la Plaza de San Pedro con visión directa a la ventana del tercer piso del Palacio Apostólico (el edificio a la derecha de la fachada de la Basílica, sobre la columnata). El acto es gratuito y sin entrada. Llegad 30-40 minutos antes para un buen sitio con sombra bajo la columnata izquierda.","type":"activity","duration_min":45},{"time":"12:00","icon":"🙏","title":"Ángelus del Papa León XIV","description":"El Papa León XIV —elegido en mayo de 2025— aparece en la ventana de los apartamentos papales al mediodía. Breve homilía en italiano, rezo del Ángelus en latín y saludo a los grupos de peregrinos presentes. El acto dura entre 10 y 20 minutos y es uno de esos momentos que no se olvidan: miles de personas de todo el mundo reunidas en torno a la misma oración a mediodía en Roma.","type":"activity","duration_min":20},{"time":"13:00","icon":"🍕","title":"Almuerzo en Prati","description":"Volved al barrio de Prati para comer lejos del recargo turístico del Vaticano. La Via Cola di Rienzo y las calles perpendiculares tienen buenas opciones de trattoria y pizza al corte.","type":"meal","duration_min":75},{"time":"14:30","icon":"🚌","title":"Traslado a Piazza del Popolo (zona norte)","description":"Metro línea A desde Lepanto hasta Flaminio (2 paradas, ~4 min) o paseo a pie por las orillas del Tíber (~25 min, muy agradable). Llegáis a la puerta norte de Roma, uno de los conjuntos barrocos más impresionantes de la ciudad.","type":"transport","duration_min":20},{"time":"15:00","icon":"⛪","title":"Basílica de Santa María del Popolo","description":"Dentro de la Piazza del Popolo, junto a la Porta Flaminia, se esconde una de las iglesias con más arte por metro cuadrado de toda Roma: dos Caravaggios en la Capilla Cerasi (la Crucifixión de San Pedro y la Conversión de San Pablo), la Capilla Chigi diseñada por Rafael y completada por Bernini, y obras de Pinturicchio. Entrada gratuita.","type":"visit","duration_min":45},{"time":"15:50","icon":"🏛️","title":"Piazza del Popolo e Iglesias Gemelas","description":"La gran plaza elíptica reformada por Valadier en el siglo XIX con su obelisco flaminio (el más antiguo de Roma, del siglo XIII a.C., traído por Augusto desde Heliópolis). En el extremo sur de la plaza, las dos iglesias gemelas barrocas: Santa María in Montesanto (la 'Iglesia de los artistas', donde se celebra la Misa degli artisti) y Santa María dei Miracoli. A primera vista parecen idénticas, pero tienen planos distintos por un problema de espacio que el arquitecto Carlo Rainaldi resolvió con un efecto óptico puro.","type":"visit","duration_min":40},{"time":"16:35","icon":"🏺","title":"Ara Pacis y Piazza Augusto Imperatore","description":"A 5 minutos a pie hacia el Tíber, el Ara Pacis Augustae (Altar de la Paz de Augusto, 9 a.C.) es uno de los monumentos mejor conservados del Imperio Romano, protegido desde 2006 en un moderno museo de Richard Meier (entrada ~10 €; el exterior es gratuito). La Piazza Augusto Imperatore contiene el Mausoleo de Augusto —la tumba circular de 90 metros de diámetro donde se enterraron los emperadores de la dinastía Julio-Claudia, restaurado y reabierto en 2021.","type":"visit","duration_min":50},{"time":"17:30","icon":"🏰","title":"Piazza di Spagna y Escalinata","description":"15 minutos a pie hacia el sur por Via del Babuino o metro Flaminio hasta Spagna (1 parada). La Scalinata di Trinità dei Monti (135 peldaños, 1723-1725) y la Fontana della Barcaccia de Bernini padre en la base. Subid los peldaños —prohibido sentarse en ellos, multa de 250 €— y disfrutad de las vistas del centro desde arriba.","type":"visit","duration_min":35},{"time":"18:10","icon":"🌅","title":"Paseo al Pincio y atardecer en Piazzale Napoleone I","description":"Desde la cima de la Escalinata, girad a la derecha y caminad 10 minutos por el Viale della Trinità dei Monti hacia los jardines del Pincio (Villa Borghese). El Piazzale Napoleone I —la terraza del Pincio— es el mirador más elegante de Roma: desde aquí se ve la Piazza del Popolo directamente debajo, la cúpula de San Pedro en el horizonte, el Vittoriano, el Tíber y los tejados de la ciudad. El sol en julio se pone hacia las 20:45 y los 30-40 minutos anteriores son los mejores para fotografiar. Llegad antes de las 20:00 para conseguir sitio en la barandilla.","type":"activity","duration_min":75},{"time":"21:00","icon":"🍷","title":"Cena en el barrio de Prati o de camino","description":"Bajad desde el Pincio a la Piazza del Popolo por las rampas y tomad el metro desde Flaminio hasta Lepanto. Cena en Prati o, si tenéis energía, en algún restaurante de la zona de Cola di Rienzo.","type":"meal","duration_min":90}],"places":[{"id":"basilica-san-pedro","name":"Basílica de San Pedro","coords":{"lat":41.9022,"lng":12.4539},"review":"La mayor iglesia del mundo (187 m de largo). La Pietà de Miguel Ángel (1499, 24 años del artista), el baldaquino de Bernini y la terraza de la cúpula con las mejores vistas de la Plaza antes de que se llene de turistas son los tres imprescindibles.","hours":"Diariamente 7:00–19:00 (verano hasta 18:30). Cúpula: 8:00–18:00.","price":"Basílica: gratuita. Cúpula: 8 € (escaleras) / 6 € (ascensor hasta la mitad). No confundir con la entrada a la necrópolis subterránea (20 €, reserva en excav.vaticana.va).","tips":"Código de vestimenta estricto: hombros Y rodillas cubiertos. Llevad un pañuelo. A las 8:00 hay poca gente: aprovechad.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9022,12.4539","verified_at":"2025-06-15"},{"id":"plaza-san-pedro","name":"Plaza de San Pedro — Ángelus 12:00","coords":{"lat":41.9022,"lng":12.4539},"review":"Columnata oval de Bernini (1656-1667, 284 columnas, 140 santos). El obelisco central tiene 3.500 años y vino de Heliopolis. El Papa León XIV aparece en la ventana del tercer piso del Palacio Apostólico (edificio a la derecha de la Basílica) todos los domingos a las 12:00 para el Ángelus. Gratuito, sin entrada.","hours":"Siempre abierta","price":"Gratuita","tips":"Para el Ángelus: llegad 30-40 min antes. Colocaos con visión directa a la ventana marcada con una lámpara perpetua. La columnata izquierda da sombra.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9022,12.4539","verified_at":"2025-06-15"},{"id":"museos-vaticanos","name":"Museos Vaticanos y Capilla Sixtina","coords":{"lat":41.9065,"lng":12.4536},"review":"⚠️ CERRADOS EL DOMINGO 13 DE JULIO. Reservad para el SÁBADO 12 en museivaticani.va. Recorrido óptimo: Galería de los Mapas → Estancias de Rafael → Capilla Sixtina. Planead al menos 3 horas. En la Sixtina, silencio absoluto y prohibido fotografiar.","hours":"Lunes–Sábado 8:00–19:00 (última entrada 17:00). CERRADO todos los domingos excepto el último del mes.","price":"Adultos: ~20 € + 5 € gestión online. Reducida menores 18 años: ~8 €. Reserva obligatoria en julio.","tips":"Reservad con 2-3 semanas de antelación en julio. Llegad 15 min antes de vuestra franja. Código de vestimenta obligatorio.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9065,12.4536","verified_at":"2025-06-15"},{"id":"basilica-sm-popolo","name":"Basílica de Santa María del Popolo","coords":{"lat":41.9109,"lng":12.4764},"review":"Dos Caravaggios en la Capilla Cerasi (Crucifixión de Pedro y Conversión de Pablo) y la Capilla Chigi de Rafael/Bernini. Una de las iglesias con más densidad de obras maestras de Roma. Fundada en 1099 sobre la tumba de Nerón.","hours":"7:30–12:30 y 16:00–19:00 (festivos: 16:30–18:00). Gratuita.","price":"Gratuita","tips":"La oscuridad de las capillas laterales hace difícil ver los Caravaggios: usad las monedas (1 €) que dan luz artificial a cada capilla.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9109,12.4764","verified_at":"2025-06-15"},{"id":"piazza-del-popolo","name":"Piazza del Popolo e Iglesias Gemelas","coords":{"lat":41.9106,"lng":12.4761},"review":"La gran puerta norte de Roma. El obelisco flaminio (siglo XIII a.C.) y las dos iglesias gemelas barrocas (Montesanto y Miracoli, 1662-1679) que flanquean la bocacalle del Corso. Un efecto óptico perfecto de Rainaldi y Bernini.","hours":"Plaza: siempre abierta. Iglesias gemelas: horario religioso variable.","price":"Plaza y exterior: gratuito","tips":"La mejor foto es desde el extremo sur mirando al obelisco con las tres calles (Corso, Babuino, Ripetta) abriéndose detrás. Metro Flaminio, línea A.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9106,12.4761","verified_at":"2025-06-15"},{"id":"ara-pacis","name":"Ara Pacis y Mausoleo de Augusto","coords":{"lat":41.9058,"lng":12.4747},"review":"El Altar de la Paz de Augusto (9 a.C.) es uno de los mejores ejemplos de escultura augustea conservados. Junto a él, el Mausoleo de Augusto, la tumba circular de la dinastía julio-claudia, restaurado y reabierto en 2021 tras décadas de abandono.","hours":"Ara Pacis: 9:30–19:30. Mausoleo: visitas con reserva.","price":"Ara Pacis: ~10 €. Mausoleo: ~5 € (reserva online).","tips":"El exterior del Ara Pacis es visible desde la calle sin pagar. Si el tiempo es limitado, contempadlo desde fuera y continuad hacia Spagna.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9058,12.4747","verified_at":"2025-06-15"},{"id":"piazza-spagna","name":"Piazza di Spagna y Escalinata","coords":{"lat":41.9058,"lng":12.4823},"review":"La Scalinata di Trinità dei Monti (135 peldaños, 1723-1725) conecta la embajada española (base) con la iglesia francesa (cima). Keats murió en la casa a la derecha de los peldaños en 1821. Las vistas desde arriba son magníficas.","hours":"Siempre abierta","price":"Gratuita. Prohibido sentarse en los peldaños: multa de 250 €.","tips":"Subid a la cima y girad a la derecha: en 10 minutos llegaréis al Pincio por el Viale della Trinità dei Monti. Es la ruta más bonita.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9058,12.4823","verified_at":"2025-06-15"},{"id":"pincio-mirador","name":"Terraza del Pincio — Piazzale Napoleone I","coords":{"lat":41.912,"lng":12.4822},"review":"El mirador más elegante de Roma. Desde Piazzale Napoleone I se ve la Piazza del Popolo directamente abajo, la cúpula de San Pedro en el horizonte, el Vittoriano y el meandro del Tíber. Al atardecer, la luz convierte el panorama en una acuarela. Llegad 30-40 minutos antes de la puesta de sol (julio: hacia las 20:45).","hours":"Abierto todo el día, gratuito","price":"Gratuito","tips":"Desde la cima de la Escalinata di Spagna, girad a la derecha y caminad 10-12 minutos por el Viale della Trinità dei Monti. También accesible subiendo las rampas desde la Piazza del Popolo. Metro Flaminio.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.912,12.4822","verified_at":"2025-06-15"}],"restaurants":[{"name":"Il Sorpasso","meal":"almuerzo","speciality":"Tablas de embutidos y quesos romanos, sándwiches de porchetta, vino natural por copas","price_range":"€€","reservation_required":false,"notes":"Via Properzio 31, Prati. Bar-bistrot muy popular entre los romanos jóvenes del barrio. Perfecto post-Ángelus. Sin reserva.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=Il%20Sorpasso%20Roma"}],"alternative_plans":{"more_time":"Si los Museos Vaticanos los habéis reservado para el sábado 12, el domingo 13 tendréis toda la mañana para la Basílica. Añadid la visita interior al Castel Sant'Angelo (15 €, terraza con las mejores vistas del Vaticano desde el lado contrario) entre las 9:00 y las 11:00.","less_time":"Si el calor aprieta, simplificad la tarde: Piazza del Popolo + Santa María del Popolo + Pincio. Saltad el Ara Pacis y la Spagna para otro día o no los hagáis.","rainy_day":"La lluvia no afecta al Ángelus (el Papa sale igualmente). La Basílica es interior. Santa María del Popolo es interior. El Pincio con lluvia tiene un ambiente especial pero las vistas disminuyen.","with_kids":"Para el Ángelus, colocaos cerca de la columnata izquierda: hay sombra y una ligera elevación del suelo que mejora la visibilidad. En la Escalinata, subid despacio y descansad en los rebajes laterales."},"logistics":{"walking_km":7,"walking_time_min":105,"public_transport":"Metro A: Lepanto → Flaminio (2 paradas, ~4 min, 1,50 €). Bus 23 desde Prati hasta Lungotevere Vaticano. Bus 117 (eléctrico) por el centro histórico."},"info":{"travel_tips":["Museos Vaticanos CERRADOS el domingo 13 de julio (no es el último del mes). Reservad para el sábado 12 en museivaticani.va.","El Ángelus es gratuito y sin entrada. Solo necesitáis estar en la Plaza antes de las 12:00.","Código de vestimenta en toda la Ciudad del Vaticano: hombros y rodillas cubiertos. Sin excepciones.","El Papa León XIV es el primer Papa americano de la historia, elegido en mayo de 2025. Sus Ángelus dominicales son un evento masivo en el año jubilar 2025."],"access":["Vaticano: desde Prati, 15 min a pie por Via della Conciliazione. Bus 23 o 271 desde el hotel.","Piazza del Popolo: metro A hasta Flaminio o paseo a pie 25 min por el Lungotevere."],"facts":["La Pietà de Miguel Ángel es la única obra que el artista firmó: su nombre aparece en la banda que cruza el pecho de la Virgen, aparentemente después de que alguien la atribuyera a otro escultor.","La Piazza del Popolo toma su nombre de un árbol, el álamo (populus en latín), que abundaba en la zona en la Antigüedad, y no del 'pueblo' como podría pensarse.","La Basílica de Santa María del Popolo fue fundada en 1099 por el Papa Pasquale II sobre la tumba del odiado Nerón, cuyo fantasma aterrorizaba el lugar según la leyenda."]}},{"day":3,"date":"2026-07-13","title":"Roma Antigua · Coliseo, Vittoriano, Aventino y cena en Trastevere","hero_image":"","timeline":[{"time":"08:00","icon":"☕","title":"Desayuno y salida muy temprana","description":"Desayuno rápido en bar del barrio. Salid antes de las 8:30 para llegar al Coliseo justo en su apertura, antes del calor y las colas.","type":"meal","duration_min":25},{"time":"08:30","icon":"🏟️","title":"Coliseo — entrada en la apertura","description":"El Coliseo abre a las 8:30. Con la entrada reservada online (18 € adultos; menores 18 años UE: 2 € mostrando DNI), entráis sin cola directamente. La visita estándar dura 60-90 minutos. La misma entrada incluye el Foro Romano y el Palatino (válida 24 horas). Reservad en ticketing.colosseo.it con al menos 2-3 semanas de antelación. Entradas NOMINALES: llevad DNI.","type":"visit","duration_min":90},{"time":"10:00","icon":"🏛️","title":"Foro Romano y Monte Palatino","description":"La misma entrada del Coliseo da acceso al Foro Romano y al Palatino. El Foro es el antiguo corazón político de Roma: la Curia Iulia (Senado), el Templo de Saturno, el Arco de Tito, la Vía Sacra donde desfilaban los generales triunfadores. El Palatino —la colina más lujosa del Imperio, origen de la palabra 'palacio'— tiene las mejores vistas sobre el Foro y el Coliseo.","type":"visit","duration_min":90},{"time":"11:30","icon":"🏛️","title":"Vittoriano (Altar de la Patria) — terraza panorámica","description":"15 minutos a pie desde el Foro por la Via dei Fori Imperiali, pasando junto a la Columna de Trajano. El Vittoriano es acceso gratuito en los niveles inferiores; la terraza superior (ascensor de cristal, 12 €) ofrece el panorama de 360° más completo de Roma: Coliseo, Foro, Tíber, Panteón, Vaticano y los Montes Albanos al fondo. Los viernes y sábados abre también de noche (19:30-22:30).","type":"visit","duration_min":60},{"time":"13:00","icon":"🍝","title":"Almuerzo en la zona del Aventino","description":"Desde el Vittoriano, caminad o tomad un taxi/bus hacia la zona del Circo Máximo (~15 min). Almorzad en alguno de los restaurantes de la Via Marmorata o Via Galvani (barrio Testaccio), conocido por su comida auténtica y barata.","type":"meal","duration_min":75},{"time":"14:30","icon":"🏟️","title":"Circo Máximo","description":"A 5 minutos a pie desde Testaccio, el Circo Máximo es el mayor estadio de la Antigüedad: 600 metros de largo, 250.000 espectadores de pie viendo carreras de cuadrigas. Hoy es una explanada de hierba donde los romanos corren y pasean. El área arqueológica tiene acceso parcial (metro Circo Massimo, línea B).","type":"visit","duration_min":20},{"time":"15:00","icon":"△","title":"Pirámide de Cestio","description":"Metro línea B desde Circo Massimo hasta Piramide (1 parada). La única pirámide de Roma: 36 metros de altura, construida entre el 18 y el 12 a.C. como tumba del magistrado Cayo Cestio Epulón. Junto a la Porta San Paolo (parte de las Murallas Aurelianas del siglo III). El exterior se ve perfectamente desde la calle; el interior solo se visita con reserva los 1.º y 3.er sábados del mes.","type":"visit","duration_min":20},{"time":"15:30","icon":"🍊","title":"Subida al Aventino — Jardín de los Naranjos","description":"Subid a pie (15-20 min) o en taxi hasta el Giardino degli Aranci (Parco Savello), en la colina del Aventino. Este pequeño jardín rectangular de naranjos amargos, fundado por dominicos en el siglo XIII, tiene uno de los mejores miradores gratuitos de Roma: las vistas de la cúpula de San Pedro sobre el Tíber y el Trastevere son excepcionales. Junto a él, la Basilica di Santa Sabina del siglo V —una de las basílicas paleocristianas mejor conservadas de Roma, con la famosa puerta tallada en madera de ciprés del año 430 d.C.","type":"visit","duration_min":45},{"time":"16:20","icon":"🔑","title":"Piazza dei Cavalieri di Malta — La cerradura del Vaticano","description":"A 2 minutos a pie del Jardín de los Naranjos. La Piazza dei Cavalieri di Malta fue diseñada por Piranesi en 1765 y es territorio soberano de la Soberana Orden de Malta —uno de los tres estados soberanos dentro de Roma, junto al Vaticano. La enorme puerta verde de la Villa del Priorato di Malta tiene en su cerradura uno de los secretos más fotogéniados de Roma: mirad por el ojo de la cerradura y veréis la cúpula de San Pedro enmarcada perfectamente al final de un túnel de cipreses recortados. La cola puede tener 10-15 personas, pero avanza rápido.","type":"visit","duration_min":20},{"time":"17:00","icon":"⛪","title":"Basílica de Santa Sabina","description":"A 2 minutos a pie del Jardín de los Naranjos. Fundada en el siglo V sobre una casa romana del Aventino, Santa Sabina es una de las basílicas paleocristianas mejor conservadas de Roma: su longitud de 54 metros, 24 columnas corintias de mármol reutilizadas de un templo de Juno y una puerta de madera de ciprés tallada en el año 430 d.C. —una de las más antiguas del mundo cristiano— hacen de este espacio un silencio improbable en la Roma de julio. Gratuita.","type":"visit","duration_min":25},{"time":"17:30","icon":"🌹","title":"Roseto Comunale — La rosaleda de Roma","description":"A 5 minutos a pie bajando por Via di Valle Murcia, la Roseto Comunale di Roma es una de las colecciones de rosas más importantes de Europa: más de 1.100 variedades plantadas en terrazas en la ladera del Aventino, con vistas sobre el Circo Máximo. Abierta gratuitamente de mayo a junio normalmente, pero en julio permanece accesible para pasear entre los arriates ya sin flores —el jardín mismo, con sus terrazas y vistas, merece la parada. Desde aquí se comprende la escala del Circo Máximo que veis directamente abajo.","type":"activity","duration_min":30},{"time":"18:05","icon":"🏛️","title":"Santa María in Cosmedin y la Boca de la Verdad","description":"Bajad del Aventino (10 min a pie) hasta la Piazza della Bocca della Verità. La Boca de la Verdad (Bocca della Verità) es una máscara de mármol del siglo I d.C. de 1.300 kg empotrada en el pórtico de Santa María in Cosmedin: según la leyenda medieval, quien metía la mano con una mentira en la boca la perdía de un mordisco. La hizo mundialmente famosa Audrey Hepburn en 'Vacaciones en Roma' (1953). La iglesia de Santa María in Cosmedin, construida en el siglo VI sobre los restos de un templo romano, tiene un suelo de mosaicos cosmatéti únicos. A su lado, el Arco di Giano (el único arco de cuatro frentes de Roma, siglo IV) y los restos del Tempio di Ercole, el templo circular de mármol mejor conservado de Roma (siglo II a.C.).","type":"visit","duration_min":35},{"time":"18:45","icon":"🌅","title":"Subida al Aventino para el atardecer","description":"Volved al Jardín de los Naranjos subiendo a pie por Via Santa Sabina (15 min). El sol en julio se pone hacia las 20:45-20:50, pero la luz dorada óptima para fotografiar empieza a las 19:30-20:00. Colocaos en el mirador con vistas de San Pedro y el Tíber. El quiosco del parque sirve bebidas. Los romanos también vienen aquí al atardecer: un ambiente mucho más tranquilo que el Pincio.","type":"transport","duration_min":15},{"time":"19:00","icon":"🍊","title":"Atardecer en el Jardín de los Naranjos","description":"El Piazzale Giardino degli Aranci con la luz del atardecer sobre San Pedro, el Tíber y los tejados de Trastevere es uno de los momentos más hermosos de este viaje. El mirador de la colina del Aventino tiene orientación oeste perfecta: el sol cae exactamente detrás de la cúpula de San Pedro. Disfrutad del atardecer con calma. Después, bajad 10-15 minutos a pie hasta Trastevere para la cena.","type":"activity","duration_min":75},{"time":"20:30","icon":"🛶","title":"Bajada a Trastevere","description":"Bajad a pie desde el Jardín de los Naranjos hasta Trastevere (10-15 min por Via di Santa Sabina bajando la colina). El barrio, al otro lado del Tíber, es la Roma más auténtica. Pasad por la Piazza di Santa Maria in Trastevere con su fuente iluminada y la basílica paleocristiana del siglo IV antes de llegar al restaurante.","type":"transport","duration_min":20},{"time":"21:00","icon":"🍷","title":"Cena en Trastevere — RESERVA OBLIGATORIA","description":"Cena en Da Enzo al 29 (Via dei Vascellari 29, +39 06 581 2260) o en la Trattoria Da Lucia (Via della Mattonato 2). Ambas son referencias de la cocina romana auténtica. Pedid la carbonara, el cacio e pepe o la coda alla vaccinara. Reservad con al menos una semana de antelación.","type":"meal","duration_min":120},{"time":"23:00","icon":"🌙","title":"Última copa en Trastevere","description":"Después de cenar, Trastevere de noche es uno de los mejores planes de Roma: músicos callejeros, grupos de jóvenes en las plazas, bares abiertos hasta tarde. El Freni e Frizioni (Via del Politeama 4) es un bar de culto con aperitivos y cócteles perfectos.","type":"activity","duration_min":45}],"places":[{"id":"coliseo","name":"Coliseo — Anfiteatro Flavio","coords":{"lat":41.8902,"lng":12.4922},"review":"Inaugurado en el 80 d.C., 70.000 espectadores, 100 días de juegos inaugurales. Uno de los edificios más perfectos de la Antigüedad. La entrada incluye Foro Romano y Palatino (24 horas). Entradas NOMINALES: llevad DNI.","hours":"8:30–19:15 (última entrada 18:15). Abierto todos los días.","price":"Adultos: 18 €. Menores 18 UE: 2 € (con DNI). Reserva en ticketing.colosseo.it (solo 30 días antes). Entradas nominales.","tips":"Llegad 15 minutos antes de vuestra franja. Colas de seguridad: 10-20 minutos. No llevéis mochilas grandes; hay consigna exterior.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8902,12.4922","verified_at":"2025-06-20"},{"id":"foro-romano-palatino","name":"Foro Romano y Monte Palatino","coords":{"lat":41.8925,"lng":12.4853},"review":"El corazón político y religioso de Roma durante siglos. Curia Iulia (Senado), Templo de Saturno, Arco de Tito, Basílica de Majencio. El Palatino tiene las mejores vistas sobre el Foro. Misma entrada que el Coliseo.","hours":"9:00–19:15. Mismo billete Coliseo.","price":"Incluido en la entrada del Coliseo","tips":"El Palatino tiene sombra: visitadlo cuando apriete el sol. Llevad agua: no hay fuentes dentro del recinto.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8925,12.4853","verified_at":"2025-06-20"},{"id":"vittoriano","name":"Vittoriano — Altar de la Patria","coords":{"lat":41.8952,"lng":12.4828},"review":"Monumento construido entre 1885 y 1935 en honor al primer rey de Italia. Acceso gratuito a los niveles inferiores con la Tumba del Soldado Desconocido. La terraza superior (ascensor de cristal, 12 €) tiene el mejor panorama de 360° de Roma: Coliseo, Foro, Vaticano y Montes Albanos.","hours":"Lun–Dom 9:30–19:30 (última entrada 18:45). Viernes y sábados hasta las 22:30 (hasta 16 sept).","price":"Acceso base: gratuito. Terraza (ascensor): ~12 €. Combo museo+terraza: ~20 €.","tips":"La terraza tiene las mejores vistas temprano por la mañana (luz sobre el Foro) o tarde-noche. En julio el calor del mediodía hace la terraza incómoda. Visitadla a las 11:30-12:00.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8952,12.4828","verified_at":"2025-06-20"},{"id":"circo-massimo","name":"Circo Máximo","coords":{"lat":41.8862,"lng":12.4853},"review":"El mayor estadio de la Antigüedad: 600 metros de largo, 250.000 espectadores para carreras de cuadrigas. Hoy explanada verde entre el Palatino y el Aventino. El área arqueológica al extremo sur tiene restos visibles de las gradas y el spina central.","hours":"Área arqueológica: 9:30–18:00 (precio bajo, ~3 €). Explanada exterior: siempre abierta y gratuita.","price":"Exterior gratuito","tips":"No necesitáis entrar en el área arqueológica para entender el espacio: la vista desde el exterior ya es impresionante. Metro B: Circo Massimo.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8862,12.4853","verified_at":"2025-06-20"},{"id":"piramide-cestio","name":"Pirámide de Cestio","coords":{"lat":41.8763,"lng":12.4769},"review":"La única pirámide de Roma. 36 metros de altura, construida entre el 18 y el 12 a.C. como tumba del magistrado Cayo Cestio. Revestida en mármol blanco de Luna. Sobrevivió porque en el siglo III fue incorporada a las Murallas Aurelianas como baluarte. Metro B: Piramide.","hours":"Exterior: siempre visible. Interior: 1.º y 3.er sábados del mes, solo con reserva previa (06 39967700).","price":"Exterior gratuito","tips":"A 2 minutos a pie de la parada de metro Piramide. Junto a ella, la Porta San Paolo (puerta de las Murallas Aurelianas) y el cementerio acatólico donde están enterrados Keats y Shelley.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8763,12.4769","verified_at":"2025-06-20"},{"id":"giardino-aranci","name":"Jardín de los Naranjos — Parco Savello","coords":{"lat":41.885,"lng":12.4797},"review":"Uno de los mejores miradores gratuitos de Roma en la colina del Aventino. Fundado por dominicos en el siglo XIII sobre los restos del castillo medieval de los Savello. Los naranjos amargos flanquean la avenida central que termina en un mirador con vistas de San Pedro, el Tíber y Trastevere.","hours":"7:00–21:00 (verano). Gratuito.","price":"Gratuito","tips":"Metro B: Circo Massimo. Desde el metro, 15-20 minutos a pie subiendo la colina del Aventino. Hay un quiosco de refrescos dentro del parque.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.885,12.4797","verified_at":"2025-06-20"},{"id":"cerradura-malta","name":"Piazza dei Cavalieri di Malta — La cerradura del Vaticano","coords":{"lat":41.8833,"lng":12.4797},"review":"Diseñada por Piranesi en 1765 y territorio soberano de la Orden de Malta. A través del ojo de la cerradura de la puerta verde se ve la cúpula de San Pedro perfectamente encuadrada al final de un jardín de cipreses recortados. Desde aquí veis simultáneamente tres estados soberanos: Italia, Vaticano y Orden de Malta. Gratuito.","hours":"Siempre accesible (espacio público exterior)","price":"Gratuito","tips":"La fila puede ser de 10-15 personas pero avanza rápido. A 2 minutos a pie del Jardín de los Naranjos. No confundir con la entrada a la Villa del Priorato (cerrada al público).","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8833,12.4797","verified_at":"2025-06-20"},{"id":"trastevere-barrio","name":"Barrio de Trastevere y Piazza di Santa Maria","coords":{"lat":41.8896,"lng":12.4697},"review":"El barrio más auténtico y bohemio de Roma. La Piazza di Santa Maria in Trastevere con su fuente iluminada y la basílica del siglo IV (mosaicos del XII) es el corazón nocturno. Callejuelas adoquinadas, fachadas ocres, música en vivo y las mejores trattorias de Roma.","hours":"Barrio abierto siempre. Basílica: 7:30–21:00 (verano). Restaurantes: 12:30–15:00 y 19:30–23:30.","price":"Gratuito (basílica incluida)","tips":"Reservad mesa con al menos 5-7 días de antelación. En julio los mejores locales están llenos antes de las 20:30.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8896,12.4697","verified_at":"2025-06-20"},{"id":"santa-sabina","name":"Basílica de Santa Sabina","coords":{"lat":41.8842,"lng":12.4797},"review":"Fundada en el siglo V sobre una casa romana del Aventino. Una de las basílicas paleocristianas mejor conservadas de Roma: 24 columnas corintias de mármol, nave de 54 metros y la famosa puerta de madera de ciprés tallada en el año 430 d.C., una de las más antiguas del mundo cristiano. Gratuita y tranquila incluso en julio.","hours":"Diariamente 8:00–12:30 y 15:00–19:00. Gratuita.","price":"Gratuita","tips":"A 2 minutos del Jardín de los Naranjos. Buscad en la puerta de madera la escena de la Crucifixión (uno de los primeros ejemplos del arte cristiano antiguo). Ambiente de recogimiento: no es un museo.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8842,12.4797","verified_at":"2026-06-15"},{"id":"bocca-verita","name":"Boca de la Verdad — Santa María in Cosmedin","coords":{"lat":41.8884,"lng":12.4814},"review":"La máscara de mármol del siglo I d.C. que Audrey Hepburn hizo famosa en 'Vacaciones en Roma' (1953). La leyenda dice que muerde la mano del mentiroso. La iglesia de Santa María in Cosmedin (siglo VI) tiene suelo de mosaicos cosmatéti del XII único en Roma. A su lado: el Arco di Giano (siglo IV) y el Tempio di Ercole, el mejor templo circular romano conservado (siglo II a.C.).","hours":"Boca de la Verdad: 9:30–18:00 (entrada al pórtico). Iglesia: 10:00–17:00. Arco y Templo: siempre visibles.","price":"Entrada al pórtico de la Boca de la Verdad: 2 €. Iglesia: gratuita.","tips":"La cola para la Boca suele ser de 10-20 min en verano. Aprovechad para ver el Tempio di Ercole mientras esperáis: está justo enfrente y es extraordinario.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8884,12.4814","verified_at":"2026-06-15"}],"restaurants":[{"name":"Da Enzo al 29","meal":"cena","speciality":"Carbonara, cacio e pepe, coda alla vaccinara (rabo de buey estofado), supplì","price_range":"€€","reservation_required":true,"notes":"Via dei Vascellari 29, Trastevere. Referencia indiscutible de la cocina romana auténtica. Reserva imprescindible: +39 06 581 2260. Cierra domingos noche y lunes.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=Da%20Enzo%20al%2029%20Roma"},{"name":"Trattoria Da Lucia","meal":"cena","speciality":"Cucina romana clásica: pasta, carnes estofadas, alcachofas alla romana","price_range":"€€","reservation_required":true,"notes":"Via della Mattonato 2, Trastevere. Abierta desde 1938, la más antigua del barrio. Plan B si Da Enzo no tiene mesa. Reservad por teléfono.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=Trattoria%20Da%20Lucia%20Roma"}],"alternative_plans":{"more_time":"Si el Coliseo lo hacéis rápido (menos de 90 min), añadid el Arco de Constantino (junto al Coliseo, gratuito) y la Boca de la Verdad (Santa María in Cosmedin, junto al Circo Máximo, gratis) — la misma que Audrey Hepburn en 'Vacaciones en Roma'.","less_time":"Si el calor o el cansancio limitan la tarde, saltad la Pirámide y id directamente del Vittoriano al Aventino en taxi (10 €). No suprimáis la cerradura de Malta ni el Jardín de los Naranjos: son los momentos más únicos del día.","rainy_day":"El Coliseo es parcialmente cubierto (los arcos dan sombra). El Vittoriano tiene zonas interiores. La cerradura de Malta y el Jardín de los Naranjos son exteriores: si llueve fuerte, saltadlos e id directamente a cenar a Trastevere, que bajo la lluvia tiene un encanto especial.","with_kids":"Las adolescentes de 16 años disfrutarán especialmente de la cerradura de Malta — el truco óptico es de esos que se comentan durante años. El Jardín de los Naranjos tiene un ambiente tranquilo perfecto para el descanso de media tarde con vistas."},"logistics":{"walking_km":9,"walking_time_min":135,"public_transport":"Metro B: Colosseo (Coliseo). Bus hasta Vittoriano: líneas 40/64 hasta Piazza Venezia. Metro B: Circo Massimo y Piramide (Aventino: 15-20 min a pie desde Piramide). Bus 23 para Trastevere."},"info":{"travel_tips":["Las entradas del Coliseo son nominales: llevad DNI. Los menores de 18 UE entran con 2 € mostrando el documento.","Reservad Da Enzo o Da Lucia con al menos 7 días de antelación. En julio julio están completos rápido.","La subida al Aventino desde Piramide es una cuesta moderada: llevad calzado cómodo y agua.","En el Vittoriano, el acceso a los niveles inferiores y la Tumba del Soldado Desconocido es gratuito. Solo pagáis si subís en el ascensor a la terraza panorámica."],"access":["Coliseo: metro B parada Colosseo. Vittoriano: bus 40/64 hasta Piazza Venezia.","Aventino: metro B hasta Piramide (Pirámide de Cestio) + 15-20 min a pie subiendo. O taxi desde Testaccio (~5 €).","Trastevere: bus 23 desde Lungotevere o taxi desde el Aventino (~8 €)."],"facts":["El Coliseo debe su nombre no a su tamaño sino a una estatua colosal de Nerón (35 metros) que se alzaba junto al anfiteatro y que fue reutilizada como estatua del dios Sol.","La Orden de Malta es el único estado del mundo sin territorio propio reconocido: el ojo de la cerradura permite ver tres países distintos (Italia fuera, Vaticano al fondo y Orden de Malta en la finca).","El Circo Máximo albergaba la mayor afluencia de público de la historia del deporte antiguo: 250.000 espectadores en un solo evento, más que cualquier estadio moderno."]}},{"day":4,"date":"2026-07-14","title":"Centro histórico · Panteón, Navona, Templo de Adriano, Trevi y Santa María Maggiore","hero_image":"","timeline":[{"time":"08:30","icon":"☕","title":"Desayuno y salida al Panteón","description":"Desayuno en el barrio. Salid antes de las 9:00 para llegar al Panteón en la apertura y evitar las colas de media mañana, que en julio pueden ser de 45-60 minutos sin reserva.","type":"meal","duration_min":30},{"time":"09:00","icon":"🏛️","title":"Panteón de Agripa","description":"El edificio mejor conservado de la Antigüedad. Construido por Adriano entre los años 118 y 125 d.C., su cúpula de 43,3 metros de diámetro lleva 1.900 años en pie sin fisuras estructurales. El óculo central de 9 metros deja entrar la lluvia —que sale por un sistema de drenaje romano del siglo II— y en ciertos días del año proyecta un rayo de luz sobre la entrada exactamente al mediodía. Dentro: las tumbas de Rafael Sanzio y de los primeros reyes de Italia. Reservad entrada online (5 €) para entrar directamente sin cola.","type":"visit","duration_min":45},{"time":"10:00","icon":"🏺","title":"Obelisco de Montecitorio y Templo de Adriano","description":"A 5 minutos a pie del Panteón. El Obelisco di Montecitorio fue traído desde Heliópolis por el emperador Augusto y sirvió como gnomon (aguja) de un gigantesco reloj solar que usaba toda la llanura hasta el Mausoleo como cuadrante. A su lado, el Templo de Adriano (145 d.C.), cuyas once columnas corintias de 15 metros quedan empotradas hoy en la fachada de la Borsa di Roma. El contraste entre las columnas romanas y el edificio neoclásico es uno de esos detalles únicos de Roma.","type":"visit","duration_min":30},{"time":"10:30","icon":"⛲","title":"Piazza Navona","description":"A 10 minutos a pie al oeste. La plaza barroca más perfecta de Roma, construida sobre el estadio del emperador Domiciano (siglo I d.C.) — por eso tiene forma ovalada. La Fontana dei Fiumi de Bernini (1651) representa el Nilo, el Ganges, el Danubio y el Río de la Plata: los cuatro ríos del mundo conocido. A las 10:30 ya hay turistas pero la luz es perfecta. Hay artistas callejeros que trabajan con calidad real.","type":"visit","duration_min":45},{"time":"11:20","icon":"🌹","title":"Campo de' Fiori","description":"A 10 minutos a pie hacia el sur. El mercado más auténtico de Roma por la mañana (hasta las 13:00) — fruta, verdura, especias, flores. En el centro, la estatua en bronce del filósofo Giordano Bruno, quemado vivo aquí en 1600 por la Inquisición. Su capucha apunta hacia el Vaticano. Por la tarde la plaza se convierte en una de las más animadas de Roma, pero por la mañana es un mercado de barrio genuino.","type":"visit","duration_min":30},{"time":"12:00","icon":"🍝","title":"Almuerzo en el centro histórico","description":"Almorzad en el barrio de Campo de' Fiori o la zona Navona, alejándoos dos calles de los monumentos para evitar el recargo turístico. La Via del Pellegrino y la Via dei Banchi Vecchi tienen opciones auténticas a precios razonables.","type":"meal","duration_min":75},{"time":"13:30","icon":"🚌","title":"Traslado a Santa María Maggiore","description":"Bus o taxi desde el centro histórico hasta la Piazza Santa Maria Maggiore (~15-20 min). Metro A desde Spagna o Barberini hasta Termini, luego 5 min a pie.","type":"transport","duration_min":20},{"time":"14:00","icon":"✝️","title":"Basílica de Santa María Maggiore","description":"La más antigua y grande de las basílicas marianas de Roma, fundada por el papa Liberio en el siglo IV. En su interior: mosaicos del siglo V en la nave (los mejor conservados de Roma paleocristiana), el artesonado dorado del techo (primer oro traído de América), la Capilla Sixtina papal con la tumba de Sixto V, y la Capilla Paulina con el icono de la Virgen Salus Populi Romani. Desde abril de 2025, aquí reposa el Papa Francisco, quien pidió expresamente ser enterrado en esta basílica por su devoción a esta imagen mariana. Su tumba discreta con una rosa blanca está en el pasillo lateral.","type":"visit","duration_min":60},{"time":"15:15","icon":"🚌","title":"Vuelta al centro histórico","description":"Bus o metro Termini hacia el centro. Destino: zona de la Fontana di Trevi para una visita sin la luz del mediodía.","type":"transport","duration_min":20},{"time":"15:45","icon":"🏛️","title":"Basílica Papal de Santa María de los Ángeles (opcional)","description":"Si queréis ver una última rareza, la Basílica de Santa María de los Ángeles (Piazza della Repubblica) fue diseñada por Miguel Ángel en 1563 transformando el interior de las Termas de Diocleciano (siglo IV). La nave central tiene 100 metros de largo y 28 de ancho y utiliza las columnas originales romanas de granito rojo. Es una de las intervenciones arquitectónicas más radicales del Renacimiento. Gratuita.","type":"visit","duration_min":30},{"time":"16:30","icon":"⛲","title":"Fontana di Trevi","description":"La Fontana di Trevi es el punto de Roma que más cambia según la hora. A las 16:30 hay muchos turistas, pero con la entrada comprada online se puede visitar el acceso especial a la terraza de la fuente (nueva opción en 2024, ~5 €). Para la foto de la moneda, esperad a la visita nocturna. El agua de la fuente viene del Acqua Vergine, el único acueducto romano que nunca fue destruido (construido en el 19 a.C. por Agripa).","type":"visit","duration_min":30},{"time":"17:30","icon":"🛍️","title":"Tiempo libre y compras","description":"Paseo por la zona de Trevi, Via Condotti o el barrio del Corso para las últimas compras de souvenirs. La zona de la Via della Croce (cerca de Spagna) tiene delicatessen y productos italianos de calidad para traer a casa.","type":"free","duration_min":90},{"time":"19:00","icon":"🏨","title":"Regreso al hotel y preparativos de salida","description":"Volved al hotel en Prati para recoger las maletas y preparar la salida. El vuelo es a las 21:30: salid del hotel a las 18:30 en taxi (~40 €, ~45 min, tarifa fija) o a las 19:00 en taxi hasta Termini + Leonardo Express.","type":"checkout","duration_min":60},{"time":"21:30","icon":"✈️","title":"Vuelo de regreso a Alicante","description":"Salida desde Fiumicino a las 21:30. Llegada a Alicante a las 23:30.","type":"checkout","duration_min":120}],"places":[{"id":"panteon-agripa","name":"Panteón de Agripa","coords":{"lat":41.8986,"lng":12.4769},"review":"El edificio mejor conservado de la Antigüedad. Cúpula de 43,3 m sin fisuras desde el año 125 d.C. Dentro: tumbas de Rafael y los primeros reyes de Italia. El óculo central de 9 m deja entrar la lluvia y en días especiales proyecta un rayo de luz sobre la puerta al mediodía.","hours":"Diariamente 9:00–19:00 (última entrada 18:30). Solo cerrado Navidad y Año Nuevo.","price":"5 € (reserva en coopculture.it). Menores 18 UE: gratuito. Con reserva online saltáis la cola de taquilla.","tips":"Sin reserva en julio: colas de 45-60 min. Código de vestimenta (iglesia en uso): hombros y rodillas cubiertos.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8986,12.4769","verified_at":"2025-06-20"},{"id":"obelisco-montecitorio-templo-adriano","name":"Obelisco de Montecitorio y Templo de Adriano","coords":{"lat":41.9003,"lng":12.4793},"review":"El obelisco de Augusto (siglo XIII a.C., traído de Heliópolis) fue el gnomon de un gigantesco reloj solar. El Templo de Adriano (145 d.C.) conserva once columnas corintias empotradas en la fachada de la actual Bolsa de Roma. La superposición de épocas es perfectamente visible.","hours":"Espacio público, siempre abierto","price":"Gratuito (exterior)","tips":"A 5 min a pie del Panteón en dirección norte. La Piazza di Pietra (donde está el Templo) tiene terrazas de café con vistas únicas a las columnas.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9003,12.4793","verified_at":"2025-06-20"},{"id":"piazza-navona","name":"Piazza Navona","coords":{"lat":41.8992,"lng":12.473},"review":"La plaza barroca más perfecta de Roma, sobre el estadio de Domiciano (siglo I). La Fontana dei Fiumi de Bernini (1651) con los cuatro ríos del mundo. Artistas callejeros de calidad real. A las 10:30 hay luz perfecta para fotografiar.","hours":"Siempre abierta (espacio público)","price":"Gratuita","tips":"Entrad por la Via del Corsia Agonale para la mejor perspectiva frontal de la fuente central.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8992,12.473","verified_at":"2025-06-20"},{"id":"campo-dei-fiori","name":"Campo de' Fiori","coords":{"lat":41.8956,"lng":12.4722},"review":"Mercado auténtico por la mañana hasta las 13:00. La estatua de Giordano Bruno (quemado aquí en 1600) preside la plaza. Un barrio de Roma que funciona para los locales, no para los turistas.","hours":"Mercado: lunes-sábado 7:00–13:00. Plaza: siempre abierta.","price":"Gratuito","tips":"Si llegáis con hambre, el Supplì Roma en Via di San Francesco a Ripa 137 hace los mejores supplì de la ciudad (4-5 minutos en Uber desde Campo de' Fiori).","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8956,12.4722","verified_at":"2025-06-20"},{"id":"santa-maria-maggiore","name":"Basílica de Santa María Maggiore","coords":{"lat":41.8977,"lng":12.4996},"review":"La más grande y antigua de las basílicas marianas de Roma (siglo IV). Mosaicos paleocristianos del siglo V únicos. Artesonado con el primer oro traído de América. Desde 2025: tumba del Papa Francisco en el pasillo lateral entre la Capilla Paulina y la Capilla Sforza. Uno de los destinos de peregrinación más visitados de Roma en este momento.","hours":"Diariamente 7:00–19:00. Gratuita.","price":"Gratuita. Museo Liberiano: lunes-sábado 9:30–18:00 (~5 €).","tips":"Metro A y B: parada Termini, luego 5 min a pie. La tumba del Papa Francisco está señalizada discretamente. El ambiente es de recogimiento: respetad el silencio.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.8977,12.4996","verified_at":"2025-06-20"},{"id":"fontana-trevi","name":"Fontana di Trevi","coords":{"lat":41.9009,"lng":12.4833},"review":"La fuente más famosa del mundo. Diseñada por Nicola Salvi e inaugurada en 1762. El dios Neptuno preside el conjunto sobre un Arco de Triunfo ficticio. El agua viene del acueducto Acqua Vergine (19 a.C.), el único acueducto romano que nunca fue destruido. De noche, con los focos y el agua azul brillando, es incomparable.","hours":"24 horas. Iluminada hasta la 1:00 aprox.","price":"Gratuita. Moneda de rigor: 1 €.","tips":"De noche hay menos gente. Prohibido subirse al borde: multa de 280 €. La fuente recauda ~1,5 millones de euros al año, donados a Cáritas Roma.","gmaps_url":"https://www.google.com/maps/search/?api=1&query=41.9009,12.4833","verified_at":"2025-06-20"}],"restaurants":[{"name":"Da Tonino","meal":"almuerzo","speciality":"Pasta romana del día, pollo alla cacciatora, carciofi alla romana","price_range":"€","reservation_required":false,"notes":"Via del Governo Vecchio 18, cerca de Campo de' Fiori y Navona. Trattoria de barrio sin pretensiones, precios bajos, cocina diaria. Sin carta turística. Llegar pronto (abren a las 12:30).","gmaps_url":"https://www.google.com/maps/search/?api=1&query=Da%20Tonino%20Roma"}],"alternative_plans":{"more_time":"Añadid el Barrio Judío entre Campo de' Fiori y el almuerzo: el Portico di Ottavia (restos de un pórtico del siglo II a.C.), la Gran Sinagoga y el Largo di Torre Argentina (donde fue asesinado Julio César y donde hay una colonia de gatos). Todo a 5 minutos a pie de Campo de' Fiori.","less_time":"Si el tiempo antes del vuelo es justo, suprimid Santa María de los Ángeles y la visita vespertina a Trevi (podéis verla de noche en 20 minutos). Concentrad la tarde en las maletas y el traslado al aeropuerto.","rainy_day":"El Panteón, Santa María Maggiore, Navona y el Templo de Adriano son todos visitables bajo lluvia (cubiertos o bajo porches). Tened un paraguas.","with_kids":"La tumba del Papa Francisco en Santa María Maggiore puede generar preguntas y conversaciones interesantes con adolescentes. El Campo de' Fiori es animado y fácil para ellas. La Fontana di Trevi de noche siempre funciona para cualquier edad."},"logistics":{"walking_km":6,"walking_time_min":90,"public_transport":"Bus 40/64: Prati → Campo de' Fiori y Navona. Metro A→B: Spagna o Barberini → Termini (Santa María Maggiore). Para el aeropuerto: taxi (~40 €, 45 min) o Leonardo Express desde Termini (14 €, 32 min)."},"info":{"travel_tips":["Salid del hotel para el aeropuerto a las 18:30 en taxi (tarifa fija ~40 €). El vuelo es a las 21:30.","El Leonardo Express desde Termini sale hasta las 22:35. Si tomáis el metro/bus hasta Termini y el tren, calculad al menos 1h45 de margen.","Guardad las maletas en el hotel hasta las 18:30. La mayoría de hoteles ofrecen consigna gratuita hasta la hora de salida.","La tumba del Papa Francisco en Santa María Maggiore es uno de los lugares de peregrinación más concurridos de Roma en 2025 por el Jubileo: llegad antes de las 14:00 para evitar la mayor afluencia."],"access":["Panteón: bus 40/64 hasta Largo Argentina + 10 min a pie. O bus 116 hasta Senato.","Santa María Maggiore: metro A o B hasta Termini + 5 min a pie por Via Cavour.","Fontana di Trevi: a pie desde Navona (~15 min) o bus 52/53/62/71 hasta Barberini."],"facts":["El Panteón fue el primer edificio romano convertido en iglesia cristiana (año 609), lo que lo salvó de los saqueos medievales. Es también el lugar donde está enterrado Rafael Sanzio, el pintor predilecto de los Papas del Renacimiento.","La tumba de Giordano Bruno en Campo de' Fiori fue una reivindicación anticlerical del siglo XIX: la estatua fue inaugurada en 1889 por grupos masónicos y librepensadores precisamente en el lugar de su ejecución, mirando hacia el Vaticano.","Santa María Maggiore tiene en su interior el único obelisco de Roma sin inscripciones jeroglíficas: fue creado directamente en Roma en época imperial como imitación de los auténticos egipcios."]}}],"practical_tips":[{"icon":"🚇","title":"Transporte en Roma","items":[{"subtitle":"Metro, bus y billete de 75 minutos","text":"Roma tiene dos líneas de metro (A y B) y una extensa red de autobuses. El billete de 75 minutos cuesta 1,50 € y permite transbordos ilimitados. Un billete de 24 horas cuesta 7 € y el de 48 horas, 12,50 €. Compradlos en estafetas (quioscos), máquinas de metro o en la app CityMapper. Validadlos siempre al entrar."},{"subtitle":"Aeropuerto Fiumicino: Leonardo Express","text":"El Leonardo Express (Fiumicino–Termini) cuesta ~14 €/persona y tarda 32 minutos, saliendo cada 30 min (6:23–23:23). Para el vuelo del martes 15 a las 21:30: salid del hotel a las 18:30 en taxi (tarifa fija ~40 €, ~45 min incluyendo tráfico nocturno) o a las 19:00 desde Termini con el Leonardo Express."},{"subtitle":"Taxi en Roma","text":"Los taxis oficiales son blancos con el escudo del Municipio. Exigid siempre taxímetro o tarifa fija oficial (aeropuerto–centro: 48 €, tarifa nocturna algo más). App IT Taxi es la oficial romana."},{"subtitle":"A pie: el mejor transporte","text":"El centro histórico de Roma se recorre perfectamente a pie. Desde Prati al Vaticano: 10 min. A Castel Sant'Angelo: 8 min. Al Coliseo: 35 min a pie o 25 min en metro. Todo el día 4 es caminable. Llevad calzado muy cómodo: los adoquines son traidores con suela fina."}]},{"icon":"💶","title":"Trucos de ahorro","items":[{"subtitle":"Reservad online las entradas principales","text":"Coliseo (ticketing.colosseo.it), Museos Vaticanos (museivaticani.va) y Panteón (coopculture.it) se reservan online. Las comisiones son mínimas comparadas con las horas de cola que ahorráis. En julio, ir sin reserva puede suponer 1-2 horas de espera al sol."},{"subtitle":"Menores de 18 UE entran gratis o reducido","text":"Las niñas de 16 años con DNI español entran gratis al Coliseo (2 €), Foro Romano y Palatino. El Panteón también tiene entrada gratuita para menores 18 UE. Los Museos Vaticanos aplican tarifa reducida (~8 €). Verificad siempre en la web oficial del monumento."},{"subtitle":"Nasoni: agua gratis en toda Roma","text":"Roma tiene más de 2.500 fuentes de agua potable llamadas 'nasoni' (narices). Son pequeños grifos de hierro verde que manan agua fría de excelente calidad. Llevad botella reutilizable: ahorraréis 20-30 € en agua durante el viaje."},{"subtitle":"Comed donde no hay menú en varios idiomas","text":"Evitad los restaurantes con menú en 8 idiomas y foto de los platos en la puerta. La regla de oro: si alguien os invita a entrar desde la puerta, no entréis. Una carbonara auténtica en Prati: 10-12 €; junto a la Fontana di Trevi: 18-22 €."}]},{"icon":"🏛️","title":"Cultura local y etiqueta","items":[{"subtitle":"Código de vestimenta en lugares religiosos","text":"Obligatorio en la Basílica de San Pedro, los Museos Vaticanos, el Panteón, Santa María Maggiore, Santa María del Popolo y cualquier iglesia: hombros Y rodillas cubiertos. Los inspectores de los monumentos son estrictos. Llevad siempre un pañuelo o chal ligero en la mochila."},{"subtitle":"El ritmo romano","text":"En Roma el desayuno es de pie en el bar (cappuccino + cornetto, 1,50 €). Las comidas empiezan a las 13:30 y las cenas no antes de las 20:00. Los romanos no cenan a las 19:30. Si llegáis a un restaurante a esa hora en verano, estaréis solos."},{"subtitle":"Multas en monumentos","text":"Sentarse en los peldaños de la Scala di Spagna: 250 €. Subirse al borde de la Fontana di Trevi: 280 €. Comer o beber en zonas acotadas: multas variables. Los agentes municipales patrullan activamente en verano, especialmente en julio."}]},{"icon":"🍝","title":"Gastronomía romana imprescindible","items":[{"subtitle":"Las cuatro pastas canónicas de Roma","text":"Carbonara (guanciale, yema, pecorino, pimienta — NUNCA nata), cacio e pepe (queso pecorino y pimienta negra), amatriciana (guanciale, tomate, pecorino) y gricia (amatriciana sin tomate). Pedid siempre la que el restaurante lleva como especialidad, no la que tiene mejor nombre."},{"subtitle":"El supplì: croqueta romana de arroz","text":"El supplì es la versión romana del arancino: una bola de arroz con ragú y mozzarella, rebozada y frita. Cuando se abre, el queso derretido forma un hilo —de ahí el apodo 'supplì al telefono'. Es el aperitivo callejero romano por excelencia. Probadlo antes de cenar en Trastevere."},{"subtitle":"Gelato artesanal: cómo distinguirlo","text":"El gelato auténtico (artigianale) está en contenedores metálicos con tapa, no en montañas de colores fluorescentes. El pistacho real es verde pálido (no verde brillante), el limón es blanco amarillento. Buscad la plaquita 'artigianale' en la puerta del local."},{"subtitle":"Caffè: el ritual diario","text":"El café espreso italiano cuesta 1-1,20 € de pie en el bar. Sentarse en terraza multiplica el precio por 3-5. Los italianos beben cappuccino solo en el desayuno, nunca después de comer. Pedid 'un caffè, per favore' para el espreso estándar."}]},{"icon":"🌡️","title":"Calor y protección solar en julio","items":[{"subtitle":"Temperaturas y estrategia horaria","text":"En julio Roma alcanza 30-37°C con picos de hasta 40°C. El tramo más duro es de 12:00 a 16:00. En este viaje, las visitas de exterior (Coliseo, Foro Romano, paseos) están programadas para antes de las 12:00 o después de las 16:00. Las horas centrales del día coinciden con visitas de interior (Vittoriano, Santa María Maggiore, Panteón) o con comidas sentados."},{"subtitle":"Protección diaria obligatoria","text":"SPF 50+ cada vez que salgáis. Gorra o sombrero. Gafas de sol polarizadas. Botella de agua de 1 litro. Recordad que en el Foro Romano y el Palatino no hay fuentes ni tiendas durante todo el recorrido: llevad suficiente agua desde la entrada."}]},{"icon":"🔒","title":"Seguridad y salud","items":[{"subtitle":"Zonas de carteristas","text":"Roma es segura, pero los carteristas operan en: entorno del Coliseo, metro línea A (especialmente Termini–Spagna), Fontana di Trevi, Navona y autobuses 40/64. Llevad documentos en riñonera interior o bolsa antirrobo. No llevéis carteras en bolsillos traseros."},{"subtitle":"Emergencias médicas","text":"La Tarjeta Sanitaria Europea (TSE) cubre urgencias en hospitales italianos. El hospital más cercano a Prati: Ospedale Santo Spirito in Sassia (Lungotevere in Sassia 1, 10 min a pie). Emergencias: 112 (general), 118 (ambulancia)."},{"subtitle":"Golpe de calor en julio","text":"Síntomas: piel muy caliente y seca, confusión, mareo. Si ocurre: buscad sombra inmediatamente, agua fría, y llamad al 118. Las adolescentes activas son especialmente vulnerables en el calor de mediodía. Bebed agua constantemente y no os sobreexijáis en las primeras horas de más calor."}]},{"icon":"🎒","title":"Qué llevar cada día","items":[{"subtitle":"La mochila diaria esencial","text":"Botella de agua de 1 litro (se puede rellenar gratis en los nasoni), protector solar SPF 50+, pañuelo/chal para cubrir hombros y rodillas en iglesias, cargador portátil, tarjeta sanitaria y fotocopia del pasaporte, efectivo, auriculares, gorra."},{"subtitle":"El calzado más importante del viaje","text":"Roma tiene adoquines irregulares que destrozan los pies con suela fina. Lo ideal es una zapatilla deportiva con amortiguación real. En una jornada completa podéis caminar 10-15 km. Las chanclas son para las noches de cena, no para todo el día."}]},{"icon":"📸","title":"Fotografía: mejores horas y lugares","items":[{"subtitle":"Los mejores momentos por lugar","text":"Vaticano y Basílica de San Pedro: 8:00 antes de las colas, luz frontal. Piazza del Popolo: tarde con luz rasante desde el Pincio. Pincio: 30-40 min antes del atardecer (~20:00). Jardín de los Naranjos: atardecer (~19:30). Fontana di Trevi: 21:00-22:00, sin multitudes. Panteón: 9:00-9:30, primera hora, interior con la luz del óculo."},{"subtitle":"Prohibiciones fotográficas","text":"En la Capilla Sixtina: absolutamente prohibido fotografiar (está en uso activo como capilla). En la Basílica de San Pedro: se puede fotografiar pero no con flash ni trípode. Los selfie-sticks están prohibidos en muchos monumentos. En Santa María Maggiore: respetad el ambiente de recogimiento junto a la tumba del Papa Francisco."}]}],"packing_list":{"summer_clothing":["Camisetas de manga corta (5, ligeras y transpirables)","Pantalón corto (2)","Pantalón largo ligero o bermuda largo (1, para iglesias)","Vestido o falda (longitud que cubra rodillas, para visitas religiosas)","Camiseta extra — en julio en Roma se suda mucho"],"footwear":["Zapatillas deportivas con buena amortiguación (imprescindible — adoquín todo el día)","Chanclas o sandalia cómoda (para tarde-noche)","Zapato o sandalia con tira para las cenas (opcional)"],"underwear":["Ropa interior (días + 2 extra)","Calcetines técnicos (tantos como días + 2 extra — el adoquín pide calcetín con amortiguación)","Pijama ligero"],"items":["Móvil y cargador","Batería externa (power bank) — imprescindible con GPS activo todo el día","Auriculares","Adaptador enchufe tipo L italiano (si vuestros cargadores tienen clavija de 2 patillas gruesas)","Riñonera antirrobo (para documentos y tarjetas en zonas concurridas)","Paraguas plegable (lluvia poco probable pero en julio alguna tormenta aparece)","Botella de agua reutilizable (500 ml o 1 L)","Pañuelo grande o pareo ligero (para cubrir hombros en iglesias)"],"accessories":["Gorra o sombrero de ala ancha (imprescindible en julio)","Gafas de sol de calidad (sol mediterráneo muy fuerte)","Cinturón"],"documents":["DNI vigente (necesario para entrada reducida al Coliseo para menores 18 UE)","Pasaporte (recomendable llevarlo)","Tarjeta de crédito y de débito (tened dos por si una falla)","Efectivo en euros (100-150 €)","Tarjeta Sanitaria Europea (TSE) — gratis, solicitadla en la Seguridad Social","Entradas reservadas (Coliseo, Museos Vaticanos, Panteón) — en el móvil Y copia impresa","Confirmación de hotel impresa o descargada offline"],"toiletries":["Protector solar SPF 50+ (tamaño generoso — lo usaréis mucho)","Aftersun","Cepillo y pasta de dientes","Desodorante (roll-on o sólido para el avión)","Gel de ducha y champú","Pañuelos de papel","Compresas o tampones (según necesidad)"],"health":["Analgésicos / antiinflamatorios (ibuprofeno o paracetamol)","Antidiarreico","Antihistamínico","Protector gástrico (omeprazol)","Tiritas y apósitos para ampollas — el primer día de adoquín suele ser duro","Termómetro digital"]},"shopping":{"authentic_products":["Pasta seca artesanal (di semola di grano duro — buscad 'artigianale')","Pecorino Romano DOP al vacío: el queso de la carbonara","Limoncello o Amaretto en tiendas de alimentación (no en el aeropuerto, mucho más caro)","Artículos de cuero artesanal en el centro histórico","Postales y láminas artísticas del Campo de' Fiori y Via della Croce","Artículos religiosos con sello papal en la tienda oficial del Vaticano (columnata derecha)"],"avoid":["Souvenirs de plástico del Coliseo vendidos por ambulantes junto al monumento","Pasta o especias en envases de regalo junto a monumentos (precio x5 sin calidad extra)","Entradas 'skip the line' vendidas por revendedores junto al Coliseo: posibles fraudes","Restaurantes con menú en 8 idiomas y foto de los platos en la puerta"],"best_places":["Via della Croce (zona Spagna): tiendas de alimentación gourmet italiana para traer a casa","Mercato di Campo de' Fiori (martes por la mañana): productos frescos y artesanos locales","Prati: comercio de barrio con precios para romanos, sin recargo turístico"]},"emergency":{"local_emergency":"112 — Emergencias generales (funciona en toda Italia)","medical":"118 — Ambulancia. Hospital más cercano a Prati: Ospedale Santo Spirito in Sassia, Lungotevere in Sassia 1 (10 min a pie).","police":"113 — Policía Nacional. Carabinieri: 112. Comisaría Prati: Via Cola di Rienzo.","embassy":"Embajada de España en Roma: Via di Campo Marzio 23, Tel: +39 06 68 40 401. Urgencias consulares fuera de horario: mismo número.","insurance_reminder":"Llevad la Tarjeta Sanitaria Europea (TSE): cubre urgencias en hospitales públicos italianos sin coste. Solicitadla gratis en vuestra Seguridad Social antes del viaje."},"apps_recommended":[{"name":"Google Maps","purpose":"Navegación, horarios de metro y bus en tiempo real. Descargad el mapa de Roma offline antes de salir."},{"name":"Trenitalia","purpose":"Billetes del Leonardo Express Fiumicino–Termini. Permite cambiar la hora si el vuelo se retrasa."},{"name":"IT Taxi","purpose":"App oficial de los taxis romanos con tarifa estimada. Evita los no oficiales junto a monumentos."},{"name":"CityMapper Roma","purpose":"Planificador de rutas de transporte público más intuitivo que Google Maps para combinar metro, bus y tranvía."},{"name":"Google Translate (cámara)","purpose":"Traduce menús en italiano en tiempo real con la cámara. Muy útil en restaurantes de barrio sin menú en español."},{"name":"Vatican News","purpose":"Confirmar que el Ángelus del Papa León XIV el domingo 13 de julio se celebra en la Plaza de San Pedro (verificad el calendario de actos papales antes de ir)."},{"name":"CoopCulture","purpose":"App oficial para reservar la entrada al Panteón de Agripa. Permite saltarse la cola de taquilla en julio."}],"generation_metadata":{"generated_at":"2026-07-01T12:00:00Z","schema_version":"1.2","claude_model":"Claude Sonnet 4.6","web_search_count":11,"verification_note":"Fechas corregidas (llegada sábado 12 julio, salida martes 15 julio). Museos Vaticanos cerrados el domingo 13 (no es el último domingo del mes): reservar para el sábado 12. El Papa actual es León XIV (Francisco falleció en abril 2026 y está enterrado en Santa María Maggiore). La Pirámide de Cestio solo se visita por dentro los 1.º y 3.er sábados del mes. El Mausoleo de Augusto puede estar cerrado temporalmente: verificar en coopculture.it."}}

    theme: null          // "light" | "dark" | null (= auto)
  };

  function loadStore() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (!raw) return { ...defaultStore };
      return { ...defaultStore, ...JSON.parse(raw) };
    } catch (e) { return { ...defaultStore }; }
  }
  function saveStore() {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {}
  }

  const store = loadStore();

  // ------------------------------------------------------
  // 2. UTILIDADES
  // ------------------------------------------------------
  const fmtDate = (isoDate, opts = { day: 'numeric', month: 'short' }) => {
    const d = new Date(isoDate + 'T00:00:00');
    return d.toLocaleDateString('es-ES', opts);
  };
  const fmtMoney = (n, currency = 'EUR') => {
    return new Intl.NumberFormat('es-ES', { style: 'currency', currency, maximumFractionDigits: 0 }).format(n);
  };
  const el = (sel) => document.querySelector(sel);
  const esc = (s) => String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');

  const todayISO = () => new Date().toISOString().slice(0, 10);

  function getCurrentTripDay() {
    const today = todayISO();
    const d = DATA.days.find(d => d.date === today);
    return d || null;
  }

  // ------------------------------------------------------
  // 3. TEMA (modo oscuro)
  // ------------------------------------------------------
  function applyTheme() {
    let t = store.theme;
    if (!t) t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    document.documentElement.dataset.theme = t;
    const meta = document.querySelector('meta[name="theme-color"]');
    if (meta) meta.content = t === 'dark' ? '#14110E' : (DATA.meta?.theme_color || '#C65D3A');
  }
  el('#btn-theme').addEventListener('click', () => {
    const current = document.documentElement.dataset.theme;
    store.theme = current === 'dark' ? 'light' : 'dark';
    saveStore();
    applyTheme();
  });
  applyTheme();

  // Tema dinámico desde el JSON
  if (DATA.meta?.theme_color) {
    document.documentElement.style.setProperty('--accent', DATA.meta.theme_color);
  }

  // --- DAYS LIST ------------------------------------------
  function dayProgress(day) {
    const items = day.timeline || [];
    if (!items.length) return 0;
    const done = items.filter((_, idx) => store.checklist[`d${day.day}_t${idx}`]).length;
    return Math.round((done / items.length) * 100);
  }

  // --- MAP ------------------------------------------------
  let mapInstance = null;
  let mapLoadAttempts = 0;
  function renderMap() {
    if (!window.L) {
      mapLoadAttempts++;
      if (mapLoadAttempts > 20) {  // ~4 segundos
        el('#map').innerHTML = `<div class="empty-state" style="padding:40px 20px">
          🗺️ <br><br>
          <strong>Mapa no disponible</strong><br>
          <span style="font-size:13px">Este archivo necesita conexión para cargar los mapas.<br>Los datos del itinerario siguen disponibles en las otras pestañas.</span>
        </div>`;
        return;
      }
      setTimeout(renderMap, 200);
      return;
    }
    const om = DATA.overview_map;
    if (!om) { el('#map').innerHTML = '<p style="padding:20px">Sin datos de mapa.</p>'; return; }

    try {
      if (mapInstance) { mapInstance.remove(); mapInstance = null; }

      mapInstance = L.map('map', { zoomControl: true, attributionControl: true })
        .setView([om.center.lat, om.center.lng], om.zoom || 8);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        maxZoom: 19,
        attribution: '© OpenStreetMap'
      }).addTo(mapInstance);

      const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim();

      (om.markers || []).forEach(m => {
        const icon = L.divIcon({
          className: 'custom-marker',
          html: `<div style="width:30px;height:30px;background:${accent};color:#fff;border-radius:50%;display:grid;place-items:center;font-weight:700;font-size:13px;box-shadow:0 2px 6px rgba(0,0,0,0.3);border:2px solid #fff">${m.day}</div>`,
          iconSize: [30, 30],
          iconAnchor: [15, 15]
        });
        L.marker([m.coords.lat, m.coords.lng], { icon })
          .addTo(mapInstance)
          .bindPopup(`<strong>${esc(m.name)}</strong><br><small>Día ${m.day}</small><br><a href="#" onclick="window.__nav.goDay(${m.day});return false;">Ver día →</a>`);
      });
    } catch (err) {
      console.error('Error al inicializar el mapa:', err);
      el('#map').innerHTML = `<div class="empty-state" style="padding:40px 20px">
        ⚠️ Error al cargar el mapa.<br>
        <small>${esc(err.message || 'Desconocido')}</small>
      </div>`;
    }
  }

  // --- TIPS -----------------------------------------------
  function renderTips() {
    // Separar los tips normales de los que son de apps (para fusionarlos con apps_recommended)
    const appKeywords = ['app', 'apps', 'aplicacion', 'aplicaciones'];
    const isAppGroup = (g) => appKeywords.some(kw => g.title.toLowerCase().includes(kw));

    const normalTips = (DATA.practical_tips || []).filter(g => !isAppGroup(g));
    const appTipGroups = (DATA.practical_tips || []).filter(g => isAppGroup(g));

    // Fusionar items de apps de practical_tips + apps_recommended en un solo grupo
    const appItems = [];
    appTipGroups.forEach(g => {
      (g.items || []).forEach(i => appItems.push(i));
    });
    // Añadir apps_recommended como items adicionales (evitando duplicados por nombre)
    const existingNames = new Set(appItems.map(i => i.subtitle.toLowerCase()));
    (DATA.apps_recommended || []).forEach(a => {
      if (!existingNames.has(a.name.toLowerCase())) {
        appItems.push({ subtitle: a.name, text: a.purpose });
      }
    });

    let tipIdx = 0;

    const normalHTML = normalTips.map(g => {
      const id = tipIdx++;
      return `
      <div class="tip-group" id="tip-group-${id}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${id}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">${esc(g.icon)}</span>
            <span class="tip-group__title">${esc(g.title)}</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${(g.items || []).map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }).join('');

    // Emergencias como grupo desplegable
    const em = DATA.emergency || {};
    const emergencyItems = [
      em.local_emergency ? { subtitle: 'Emergencias general', text: em.local_emergency } : null,
      em.medical ? { subtitle: 'Médico / ambulancias', text: em.medical } : null,
      em.police ? { subtitle: 'Policía', text: em.police } : null,
      em.embassy ? { subtitle: 'Embajada / consulado', text: em.embassy } : null,
      em.insurance_reminder ? { subtitle: 'Seguro de viaje', text: em.insurance_reminder } : null
    ].filter(Boolean);

    let emergencyHTML = '';
    if (emergencyItems.length > 0) {
      const emId = tipIdx++;
      emergencyHTML = `
      <div class="tip-group" id="tip-group-${emId}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${emId}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">🆘</span>
            <span class="tip-group__title">Emergencias</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${emergencyItems.map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    // Apps unificadas como grupo desplegable
    let appsHTML = '';
    if (appItems.length > 0) {
      const appsId = tipIdx++;
      appsHTML = `
      <div class="tip-group" id="tip-group-${appsId}">
        <button class="tip-group__head" onclick="document.getElementById('tip-group-${appsId}').classList.toggle('is-open')">
          <div class="tip-group__head-left">
            <span class="tip-group__icon">📱</span>
            <span class="tip-group__title">Apps recomendadas</span>
          </div>
          <span class="chev">▾</span>
        </button>
        <div class="tip-group__body">
          ${appItems.map(i => `
            <div class="tip-item">
              <div class="tip-item__subtitle">${esc(i.subtitle)}</div>
              <div class="tip-item__text">${esc(i.text)}</div>
            </div>`).join('')}
        </div>
      </div>`;
    }

    el('#page-tips').innerHTML = `
      <h2 class="section-title" style="margin-top:0">Consejos prácticos</h2>
      ${normalHTML}

  // --- ME (checklist, presupuesto, packing, herramientas) --
  function totalExpenses() {
    return store.expenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
  }
  function overallProgress() {
    const allKeys = DATA.days.flatMap(d => (d.timeline || []).map((_, idx) => `d${d.day}_t${idx}`));
    if (!allKeys.length) return 0;
    const done = allKeys.filter(k => store.checklist[k]).length;
    return Math.round((done / allKeys.length) * 100);
  }
  function packingProgress() {
    const groups = store.packing_custom || DATA.packing_list || {};
    let total = 0, done = 0;
    Object.keys(groups).forEach(cat => {
      (groups[cat] || []).forEach((_, idx) => {
        total++;
        if (store.packing[`${cat}_${idx}`]) done++;
      });
    });
    return total ? Math.round((done / total) * 100) : 0;
  }
